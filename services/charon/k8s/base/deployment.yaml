apiVersion: apps/v1
kind: Deployment
metadata:
  name: charon
  namespace: kantheon
  labels:
    app: charon
spec:
  replicas: 1
  selector:
    matchLabels:
      app: charon
  template:
    metadata:
      labels:
        app: charon
    spec:
      containers:
        - name: charon
          image: charon:dev
          ports:
            - name: http
              containerPort: 7250
            - name: grpc
              containerPort: 7251
          env:
            - name: CHARON_HTTP_PORT
              value: "7250"
            - name: CHARON_GRPC_PORT
              value: "7251"
            # Stage 1.3 — both Seaweed (Stage 1.2) and Redis (Stage 1.3)
            # endpoints are wired. The env values point at the platform
            # Seaweed/Redis (fabric-infra). Credentials for the Seaweed
            # S3 gateway come via the CHARON_S3_ACCESS_KEY /
            # CHARON_S3_SECRET_KEY sealed secret (T5, Bora-owned content
            # task per plan §3.3); the empty defaults here mean "trust
            # the local fabric-infra endpoint" — a production deploy
            # mounts the sealed secret and overrides.
            - name: CHARON_S3_ENDPOINT
              value: "http://data-seaweedfs:8333"
            - name: CHARON_REDIS_URL
              value: "redis://data-redis:6379"
            # Phase 2 — connection registry mounted at this path (the
            # charon-connections ConfigMap below). DB credentials come from the
            # charon-db-credentials sealed secret (fabric-infra, Bora-owned);
            # envFrom is optional so a blob-only pod still starts. A listed
            # connection with an unset env fails lazily, NOT the pod (plan §4
            # Stage 2.3 — "one broken DB ≠ unready pod").
            - name: CHARON_CONNECTIONS_PATH
              value: "/etc/charon/connections.yaml"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://alloy.observability.svc.cluster.local:4317
            - name: OTEL_SERVICE_NAME
              value: charon
            - name: OTEL_ENABLED_CHARON
              value: "true"
          envFrom:
            - secretRef:
                name: charon-db-credentials
                optional: true
          volumeMounts:
            - name: connections
              mountPath: /etc/charon
              readOnly: true
          readinessProbe:
            httpGet:
              path: /ready
              port: 7250
            initialDelaySeconds: 2
            periodSeconds: 3
            failureThreshold: 20
          livenessProbe:
            httpGet:
              path: /health
              port: 7250
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              memory: 512Mi
              cpu: 250m
            limits:
              memory: 1Gi
              cpu: 1000m
      volumes:
        - name: connections
          configMap:
            name: charon-connections
---
apiVersion: v1
kind: Service
metadata:
  name: charon
  namespace: kantheon
  labels:
    app: charon
spec:
  selector:
    app: charon
  ports:
    - name: http
      port: 7250
      targetPort: 7250
    - name: grpc
      port: 7251
      targetPort: 7251
