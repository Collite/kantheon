charon {
    http {
        # 7250 — Ktor probes (HTTP). K8s Service `charon` exposes 7250.
        port = 7250
        port = ${?CHARON_HTTP_PORT}
    }
    grpc {
        # 7251 — gRPC service surface. K8s Service `charon` exposes 7251.
        port = 7251
        port = ${?CHARON_GRPC_PORT}
        # 32 MiB inbound; matches veles. Stage 1.2 will revisit if the
        # 1e6-row reference move (charon/plan.md Stage 1.2 T6 benchmark) needs
        # more headroom — the move is streamed, but the per-message cap applies.
        max-inbound-message-size-bytes = 33554432
    }

    # Stage 1.2 — SeaweedFS S3 endpoint. S3 endpoint, region, and creds live
    # in env-overridable keys (fabric-infra sets the real values per cluster).
    # Listed at Stage 1.1 so the HOCON layout is settled; the field is unused
    # until Stage 1.2's `SeaweedEndpoint` is wired in.
    s3 {
        endpoint = "http://data-seaweedfs:8333"
        endpoint = ${?CHARON_S3_ENDPOINT}
        region = "us-east-1"
        region = ${?CHARON_S3_REGION}
        access-key = ""
        access-key = ${?CHARON_S3_ACCESS_KEY}
        secret-key = ""
        secret-key = ${?CHARON_S3_SECRET_KEY}
    }

    # Stage 1.3 — Redis endpoint. Same pattern.
    redis {
        url = "redis://data-redis:6379"
        url = ${?CHARON_REDIS_URL}
        default-ttl-s = 86400
        max-value-bytes = 67108864  # 64 MiB; matches S3 multipart threshold
    }

    # Connection registry path (Phase 2 Stage 2.1 lands this).
    connections {
        path = "/etc/charon/connections.yaml"
        path = ${?CHARON_CONNECTIONS_PATH}
    }

    # Worker endpoints (Phase 3 Stage 3.1). `host:port` per engine; unset ⇒ that
    # engine isn't wired on this pod (a worker_df request → WorkerEngineUnavailable).
    # POLARS = Polars (worker.v1; read-out only — no Arrow stage-in RPC yet);
    # METIS = metis.v1 (full Import/Export/Drop).
    worker {
        polars-target = ${?CHARON_WORKER_POLARS_TARGET}
        metis-target = ${?CHARON_WORKER_METIS_TARGET}
    }

    # Move pipe defaults. The `charon.move.chunk-rows` default is 65536,
    # matching workers/polars `ResultBatch` conventions (charon/contracts.md §6).
    move {
        chunk-rows = 65536
        max-bytes-default = 134217728  # 128 MiB per-move cap override
        deadline-default-ms = 120000
    }
}

telemetry {
    # OTel — wired in Stage 1.3 (alongside the first counter); disabled at Stage 1.1.
    enabled = false
    enabled = ${?OTEL_ENABLED_CHARON}
    otlp {
        endpoint = "http://localhost:4317"
        endpoint = ${?OTEL_EXPORTER_OTLP_ENDPOINT}
    }
}
