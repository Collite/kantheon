apiVersion: apps/v1
kind: Deployment
metadata:
  name: metis
  namespace: kantheon
  labels:
    app: metis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: metis
  template:
    metadata:
      labels:
        app: metis
    spec:
      containers:
        - name: metis
          image: metis:dev
          ports:
            - name: grpc
              containerPort: 7261
            - name: http
              containerPort: 7260
          env:
            - name: METIS_GRPC_PORT
              value: "7261"
            - name: METIS_HTTP_PORT
              value: "7260"
            - name: OTEL_EXPORTER_OTLP_HOST
              value: alloy.observability.svc.cluster.local
            - name: OTEL_EXPORTER_OTLP_GRPC_PORT
              value: "4317"
          readinessProbe:
            httpGet:
              path: /readyz
              port: 7260
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /healthz
              port: 7260
            initialDelaySeconds: 60
            periodSeconds: 15
          resources:
            requests:
              memory: 1Gi
              cpu: 500m
            limits:
              memory: 4Gi
              cpu: "2"
---
apiVersion: v1
kind: Service
metadata:
  name: metis
  namespace: kantheon
  labels:
    app: metis
spec:
  selector:
    app: metis
  ports:
    - name: grpc
      port: 7261
      targetPort: 7261
    - name: http
      port: 7260
      targetPort: 7260
