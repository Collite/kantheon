apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: kantheon

resources:
  - ../../base

patches:
  - target:
      kind: Deployment
      name: kallimachos
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/imagePullPolicy
        value: Never
      # Local cluster has no Alloy/Tempo endpoint — disable OTel export so the
      # pod doesn't spam connection errors on startup. Re-enable once the
      # observability stack is provisioned locally.
      - op: replace
        path: /spec/template/spec/containers/0/env
        value:
          - name: KALLIMACHOS_PROBE_PORT
            value: "7260"
          - name: KALLIMACHOS_HTTP_PORT
            value: "7261"
          - name: KALLIMACHOS_STORAGE_PROFILE
            value: "postgres"
          - name: KALLIMACHOS_DB_URL
            value: "jdbc:postgresql://kantheon-pg:5432/kallimachos"
          - name: KALLIMACHOS_DB_USER
            value: "kallimachos"
          - name: OTEL_SERVICE_NAME
            value: kallimachos
          - name: OTEL_ENABLED_KALLIMACHOS
            value: "false"
