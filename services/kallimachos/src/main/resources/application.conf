kallimachos {
    http {
        # 7261 — the REST corpus surface (search / browse / notebooks / load).
        port = 7261
        port = ${?KALLIMACHOS_HTTP_PORT}
    }
    probe {
        # 7260 — Ktor probes (health / ready / status / metrics).
        port = 7260
        port = ${?KALLIMACHOS_PROBE_PORT}
    }

    # Single internal Kantheon Postgres, `kallimachos` database (topology §7.1).
    # The `vector` + `age` extensions are installed cluster-side (confirmed
    # available, Bora 2026-06-20). Wired in Stage 1.2 (relational/fulltext) and
    # P2 (vector/graph). Listed at Stage 1.1 so the HOCON layout is settled.
    db {
        url = "jdbc:postgresql://kantheon-pg:5432/kallimachos"
        url = ${?KALLIMACHOS_DB_URL}
        user = "kallimachos"
        user = ${?KALLIMACHOS_DB_USER}
        password = ""
        password = ${?KALLIMACHOS_DB_PASSWORD}
    }

    # Active store profile. `memory` (P1 default) runs the pod with no DB —
    # ingest → keyword query round-trips in-process (the stage gate). `postgres`
    # (deploy, Stage 1.3) wires Hikari + Flyway + the Exposed/PG adapters on the
    # single `kallimachos` database.
    storage {
        profile = "memory"
        profile = ${?KALLIMACHOS_STORAGE_PROFILE}

        # Per-plane backend in the `postgres` profile. The Ports keep Qdrant/
        # OpenSearch/Neo4j swappable by config (architecture §3, polyglot retained).
        relational = "postgres"
        fulltext   = "postgres"
        vector     = "postgres"
        graph      = "age"
    }

    # Graph-primary retrieval knobs (contracts §11; consumed from P2).
    retrieval {
        graph-hops  = 2
        k           = 8
        graph-weight = 1.0
        min-score   = 0.0
    }

    # The conformed corpus embedding dimension (architecture §11). One multilingual
    # model for the whole corpus; `dimensions` MUST equal the `doc_vectors` column N
    # (V3 migration) and the pipeline EmbedConfig — a mismatch is a config error.
    # INTERIM: ada-002 (1536-dim) until the local bge-m3 (1024) model server is up —
    # the LLM gateway 2.0 catalog serves only ada-002 for now. Revert to bge-m3/1024
    # when the local server lands (kantheon follow-up issue).
    embed {
        model-id      = "ada-002"
        model-id      = ${?KALLIMACHOS_EMBED_MODEL_ID}
        model-version = "1"
        model-version = ${?KALLIMACHOS_EMBED_MODEL_VERSION}
        dimensions    = 1536
        dimensions    = ${?KALLIMACHOS_EMBED_DIMENSIONS}
    }

    # LLM gateway — the EmbedText egress (contracts §10).
    llmgateway {
        host = "llm-gateway"
        host = ${?KALLIMACHOS_LLM_GATEWAY_HOST}
        port = 8080
        port = ${?KALLIMACHOS_LLM_GATEWAY_PORT}
    }
}

telemetry {
    # OTel — wired alongside the first counter (Stage 1.2); disabled at Stage 1.1.
    enabled = false
    enabled = ${?OTEL_ENABLED_KALLIMACHOS}
    otlp {
        endpoint = "http://localhost:4317"
        endpoint = ${?OTEL_EXPORTER_OTLP_ENDPOINT}
    }
}
