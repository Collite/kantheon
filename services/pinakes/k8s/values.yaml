# Default values for pinakes. Env-agnostic: sane defaults, NO cluster knowledge. Deploying
# environments (Olymp cluster values, or test-context values) override image, telemetry, and the
# downstream/storage wiring in extraEnv.

replicaCount: 1

image:
  repository: pinakes
  # Defaults to .Chart.appVersion when empty.
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []

# pinakes listens on an HTTP port and a gRPC port. These are the container ports AND the service
# ports AND the probe target (http).
ports:
  http: 7280
  grpc: 7281

service:
  type: ClusterIP

resources:
  requests:
    memory: 512Mi
    cpu: 250m
  limits:
    memory: 1Gi
    cpu: 1000m

# OpenTelemetry. pinakes reads a single OTLP endpoint URL (OTEL_EXPORTER_OTLP_ENDPOINT) plus the
# OTEL_ENABLED_PINAKES flag. Point `endpoint` at a collector (e.g. the cluster's Alloy) and set
# enabled; leave disabled where no collector exists (e.g. test runs).
telemetry:
  enabled: false
  # e.g. http://alloy.observability.svc.cluster.local:4317
  endpoint: ""
  serviceName: pinakes

# Downstream / storage wiring. Defaults match the platform's stable in-cluster names (Seaweed S3
# gateway + the kallimachos service) — env-agnostic. A deploying env REPLACES this list to retarget.
extraEnv:
  - { name: PINAKES_SEAWEED_ENDPOINT, value: "http://data-seaweedfs:8333" }
  - { name: PINAKES_SEAWEED_BUCKET, value: "docwh-stage" }
  - { name: PINAKES_KALLIMACHOS_HOST, value: "kallimachos" }
  - { name: PINAKES_KALLIMACHOS_PORT, value: "7261" }

# Probes (HTTP on the http port).
readinessProbe:
  path: /ready
  initialDelaySeconds: 2
  periodSeconds: 3
  failureThreshold: 20
livenessProbe:
  path: /health
  initialDelaySeconds: 5
  periodSeconds: 10

podAnnotations: {}
nodeSelector: {}
tolerations: []
affinity: {}
