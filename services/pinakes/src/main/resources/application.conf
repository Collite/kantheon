pinakes {
    http {
        # 7280 — Ktor probes.
        port = 7280
        port = ${?PINAKES_HTTP_PORT}
    }
    grpc {
        # 7281 — PinakesService gRPC surface.
        port = 7281
        port = ${?PINAKES_GRPC_PORT}
    }

    # SeaweedFS S3 stage (architecture §2 — reuse the platform gateway Charon uses).
    seaweed {
        endpoint = "http://data-seaweedfs:8333"
        endpoint = ${?PINAKES_SEAWEED_ENDPOINT}
        bucket = "docwh-stage"
        bucket = ${?PINAKES_SEAWEED_BUCKET}
        region = "us-east-1"
        region = ${?PINAKES_SEAWEED_REGION}
        access-key = ""
        access-key = ${?PINAKES_SEAWEED_ACCESS_KEY}
        secret-key = ""
        secret-key = ${?PINAKES_SEAWEED_SECRET_KEY}
    }

    # Kallimachos LoadApi target (Pinakes → warehouse internal write).
    kallimachos {
        host = "kallimachos"
        host = ${?PINAKES_KALLIMACHOS_HOST}
        port = 7261
        port = ${?PINAKES_KALLIMACHOS_PORT}
    }

    # Prometheus (LLM gateway) — the COMPILE stage egress (architecture §7).
    prometheus {
        host = "prometheus"
        host = ${?PINAKES_PROMETHEUS_HOST}
        port = 8080
        port = ${?PINAKES_PROMETHEUS_PORT}
    }

    # The conformed corpus embedding dimension (must agree with Kallimachos).
    embed {
        model-id      = "bge-m3"
        model-id      = ${?PINAKES_EMBED_MODEL_ID}
        dimensions    = 1024
        dimensions    = ${?PINAKES_EMBED_DIMENSIONS}
        model-version = "1"
        model-version = ${?PINAKES_EMBED_MODEL_VERSION}
    }

    # Compile guard — per-run token budget (0 = unbounded). Over budget → degrade
    # to mechanical pages (the corpus stays queryable, architecture §14).
    compile {
        token-budget = 0
        token-budget = ${?PINAKES_COMPILE_TOKEN_BUDGET}
    }

    # Pipeline definitions (YAML). The named per-source pipelines land in Phase 3;
    # P1 runs only the built-in mechanical EXTRACT→CHUNK→LOAD.
    pipelines {
        path = "/etc/pinakes/pipelines"
        path = ${?PINAKES_PIPELINES_PATH}
    }
}

telemetry {
    enabled = false
    enabled = ${?OTEL_ENABLED_PINAKES}
    otlp {
        endpoint = "http://localhost:4317"
        endpoint = ${?OTEL_EXPORTER_OTLP_ENDPOINT}
    }
}
