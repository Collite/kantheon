capability_id: "metis.model.diagnose:v1"
category: "metis"
version: "1.0.0"
description: |
  Run diagnostic checks on a fitted model stored in the Metis session workspace.
  Returns pass/fail per check (Ljung-Box, ADF, residual normality) and a
  summary pass flag.
