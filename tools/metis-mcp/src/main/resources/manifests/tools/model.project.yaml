capability_id: "metis.model.project:v1"
category: "metis"
version: "1.0.0"
description: |
  Generate a forecast from a fitted model for a given horizon (e.g. "+12" for
  12 periods ahead). Writes the forecast DataFrame to the session workspace
  under outputDf and returns the schema fingerprint.
