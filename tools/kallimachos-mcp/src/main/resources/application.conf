kallimachos-mcp {
    port = 7262
    port = ${?KALLIMACHOS_MCP_PORT}

    # The Kallimachos read/RAG/browse HTTP surface this wrapper forwards to.
    kallimachos-http {
        host = "kallimachos"
        host = ${?KALLIMACHOS_MCP_KALLIMACHOS_HOST}
        port = 7261
        port = ${?KALLIMACHOS_MCP_KALLIMACHOS_PORT}
    }
}

# capabilities-mcp registration (warn-and-continue). Empty by default; opt in via
# CAPABILITIES_MCP_URL or this key.
capabilities-mcp {
    url = ""
    url = ${?CAPABILITIES_MCP_URL}
}

# Shared MCP/Ktor base expects `server.port`.
server {
    port = 7262
    port = ${?KALLIMACHOS_MCP_PORT}
}
