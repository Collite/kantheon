ktor {
  deployment {
    port = 7501
    port = ${?PORT}
  }
  application {
    serviceName = "capabilities-mcp"
  }
}

telemetry {
  enabled = true
  enabled = ${?TELEMETRY_ENABLED}
}

capabilities {
  manifests-dir = "classpath:manifests"
  manifests-dir = ${?CAPABILITIES_MANIFESTS_DIR}
  ttl-seconds = 300
  ttl-seconds = ${?CAPABILITIES_TTL_SECONDS}
}
