apiVersion: v1
kind: Service
metadata:
  name: {{ include "capabilities-mcp.fullname" . }}
  labels:
    {{- include "capabilities-mcp.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "capabilities-mcp.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
