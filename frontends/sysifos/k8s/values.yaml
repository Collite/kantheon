# Default values for sysifos (the back-office workbench SPA, nginx). Env-agnostic:
# sane defaults, NO cluster knowledge. Per-environment overrides live in Olymp.
replicaCount: 1

image:
  repository: sysifos
  tag: ""           # defaults to .Chart.appVersion
  pullPolicy: IfNotPresent

imagePullSecrets: []

service:
  type: ClusterIP
  port: 7602

# nginx.conf.template `listen 7602;` (EXPOSE 7602).
containerPort: 7602

# An nginx static-file server is cheap.
resources:
  requests:
    memory: 64Mi
    cpu: 50m
  limits:
    memory: 128Mi
    cpu: 250m

# Runtime config → a ConfigMap, envFrom'd into the pod. At container start
# scripts/generate-env.sh writes the VITE_* values into /env.js (window.APP_CONFIG)
# and scripts/nginx-entrypoint.sh substitutes the BFF_UPSTREAM_* vars into the /bff
# proxy in nginx.conf.template.
config:
  # NB: sysifos's SPA reads window.APP_CONFIG.VITE_BFF_BASE (not VITE_BFF_BASE_URL,
  # which the library fe-configmap emits). bffBaseUrl below feeds VITE_BFF_BASE_URL
  # (harmless), while the app's actual key VITE_BFF_BASE is supplied via config.extra.
  bffBaseUrl: "/bff"
  bffUpstream:
    protocol: http
    host: sysifos-bff        # in-cluster sysifos-bff Service (same ns) — override per env
    port: 7601
  auth:
    enabled: false
    keycloakUrl: ""
    realm: ""
    clientId: sysifos
  telemetry:
    enabled: false
  # sysifos-specific runtime keys (window.APP_CONFIG). VITE_BFF_BASE is the app's
  # real BFF-base key (see note above); VITE_TENANT_CLAIM selects the tenant claim.
  extra:
    VITE_BFF_BASE: "/bff"
    VITE_TENANT_CLAIM: ""

# Gateway API exposure. Default off — Olymp enables it and sets the hostname.
httpRoute:
  enabled: false
  gateway:
    name: eg
    namespace: gateway
  hostname: ""               # e.g. sysifos.192-168-1-38.nip.io

readinessProbe:
  path: /healthz
  initialDelaySeconds: 2
  periodSeconds: 5
  failureThreshold: 6
livenessProbe:
  path: /healthz
  initialDelaySeconds: 5
  periodSeconds: 10

extraEnv: []
podAnnotations: {}
nodeSelector: {}
tolerations: []
affinity: {}
