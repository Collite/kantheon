server {
    listen 80;
    server_name localhost;

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Runtime config + the service catalogue are fixed-name files that change on
    # every deploy. Without an explicit Cache-Control the browser applies heuristic
    # freshness and can serve a stale env.js / services.json after a redeploy — which
    # makes the health dashboard map every tile to a missing key and render all-grey.
    # Force revalidation so a normal reload always picks up the current files.
    location = /env.js {
        root /usr/share/nginx/html;
        add_header Cache-Control "no-cache";
    }
    location = /services.json {
        root /usr/share/nginx/html;
        add_header Cache-Control "no-cache";
    }
    location = /index.html {
        root /usr/share/nginx/html;
        add_header Cache-Control "no-cache";
    }

    # Content-hashed build assets are immutable — safe to cache aggressively.
    location /assets/ {
        root /usr/share/nginx/html;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
