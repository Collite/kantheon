apiVersion: v1
kind: Service
metadata:
  name: kadmos-mcp
  labels:
    app.kubernetes.io/name: kadmos-mcp
    app.kubernetes.io/instance: kadmos-mcp
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/version: "dev"
    helm.sh/chart: kadmos-mcp-0.1.0
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: kadmos-mcp
