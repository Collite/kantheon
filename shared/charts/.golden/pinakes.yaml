---
# Source: pinakes/templates/service.yaml
apiVersion: v1
kind: Service
metadata:
  name: pinakes
  labels:
    app.kubernetes.io/name: pinakes
    app.kubernetes.io/instance: pinakes
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/version: "dev"
    helm.sh/chart: pinakes-0.1.0
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: pinakes
    app.kubernetes.io/instance: pinakes
  ports:
    - name: http
      port: 7280
      targetPort: 7280
    - name: grpc
      port: 7281
      targetPort: 7281

---
# Source: pinakes/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pinakes
  labels:
    app.kubernetes.io/name: pinakes
    app.kubernetes.io/instance: pinakes
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/version: "dev"
    helm.sh/chart: pinakes-0.1.0
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: pinakes
      app.kubernetes.io/instance: pinakes
  template:
    metadata:
      labels:
        app.kubernetes.io/name: pinakes
        app.kubernetes.io/instance: pinakes
    spec:
      containers:
        - name: pinakes
          image: "pinakes:dev"
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 7280
            - name: grpc
              containerPort: 7281
          env:
            - name: PINAKES_HTTP_PORT
              value: "7280"
            - name: PINAKES_GRPC_PORT
              value: "7281"
            - name: OTEL_SERVICE_NAME
              value: "pinakes"
            - name: OTEL_ENABLED_PINAKES
              value: "false"
            - name: PINAKES_SEAWEED_ENDPOINT
              value: http://data-seaweedfs:8333
            - name: PINAKES_SEAWEED_BUCKET
              value: docwh-stage
            - name: PINAKES_KALLIMACHOS_HOST
              value: kallimachos
            - name: PINAKES_KALLIMACHOS_PORT
              value: "7261"
          readinessProbe:
            httpGet:
              path: /ready
              port: 7280
            initialDelaySeconds: 2
            periodSeconds: 3
            failureThreshold: 20
          livenessProbe:
            httpGet:
              path: /health
              port: 7280
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            limits:
              cpu: 1000m
              memory: 1Gi
            requests:
              cpu: 250m
              memory: 512Mi
