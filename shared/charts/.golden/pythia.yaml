---
# Source: pythia/templates/service.yaml
apiVersion: v1
kind: Service
metadata:
  name: pythia
  labels:
    app.kubernetes.io/name: pythia
    app.kubernetes.io/instance: pythia
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/version: "dev"
    helm.sh/chart: pythia-0.1.0
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: pythia
    app.kubernetes.io/instance: pythia
  ports:
    - name: http
      port: 7090
      targetPort: 7090

---
# Source: pythia/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pythia
  labels:
    app.kubernetes.io/name: pythia
    app.kubernetes.io/instance: pythia
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/version: "dev"
    helm.sh/chart: pythia-0.1.0
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: pythia
      app.kubernetes.io/instance: pythia
  template:
    metadata:
      labels:
        app.kubernetes.io/name: pythia
        app.kubernetes.io/instance: pythia
    spec:
      containers:
        - name: pythia
          image: "pythia:dev"
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 7090
          env:
            - name: PYTHIA_HTTP_PORT
              value: "7090"
            - name: OTEL_SERVICE_NAME
              value: "pythia"
            - name: OTEL_ENABLED_PYTHIA
              value: "false"
            - name: PYTHIA_DB_ENABLED
              value: "true"
            - name: PYTHIA_DB_HOST
              value: kantheon-postgres
            - name: PYTHIA_DB_NAME
              value: pythia
            - name: PYTHIA_NATS_URL
              value: nats://nats:4222
          envFrom:
            - secretRef:
                name: pythia-db-credentials
                optional: true
          readinessProbe:
            httpGet:
              path: /ready
              port: 7090
            initialDelaySeconds: 2
            periodSeconds: 3
            failureThreshold: 20
          livenessProbe:
            httpGet:
              path: /health
              port: 7090
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            limits:
              cpu: 1000m
              memory: 1Gi
            requests:
              cpu: 250m
              memory: 512Mi
