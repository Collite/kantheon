apiVersion: v1
kind: ConfigMap
metadata:
  name: landing-config
  labels:
    app.kubernetes.io/name: landing
    app.kubernetes.io/instance: landing
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/version: "dev"
    helm.sh/chart: landing-0.1.0
data:
