---
# Source: landing/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: landing
  labels:
    app.kubernetes.io/name: landing
    app.kubernetes.io/instance: landing
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/version: "dev"
    helm.sh/chart: landing-0.1.0
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: landing
      app.kubernetes.io/instance: landing
  template:
    metadata:
      annotations:
        # Roll the pods when the runtime config changes (env.js / proxy upstream).
        checksum/config: ba722d6f2b736305aa9988870076be65458f34743f76da2bd6981a4de12230c9
      labels:
        app.kubernetes.io/name: landing
        app.kubernetes.io/instance: landing
    spec:
      containers:
        - name: landing
          image: "landing:dev"
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
          envFrom:
            - configMapRef:
                name: landing-config
          readinessProbe:
            httpGet:
              path: /healthz
              port: 80
            initialDelaySeconds: 2
            periodSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /healthz
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            limits:
              cpu: 250m
              memory: 128Mi
            requests:
              cpu: 50m
              memory: 64Mi
