---
# Source: argos/templates/service.yaml
apiVersion: v1
kind: Service
metadata:
  name: argos
  labels:
    app.kubernetes.io/name: argos
    app.kubernetes.io/instance: argos
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/version: "dev"
    helm.sh/chart: argos-0.1.0
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: argos
    app.kubernetes.io/instance: argos
  ports:
    - name: http
      port: 7285
      targetPort: 7285
    - name: grpc
      port: 7286
      targetPort: 7286
---
# Source: argos/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: argos
  labels:
    app.kubernetes.io/name: argos
    app.kubernetes.io/instance: argos
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/version: "dev"
    helm.sh/chart: argos-0.1.0
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: argos
      app.kubernetes.io/instance: argos
  template:
    metadata:
      labels:
        app.kubernetes.io/name: argos
        app.kubernetes.io/instance: argos
    spec:
      containers:
        - name: argos
          image: "argos:dev"
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 7285
            - name: grpc
              containerPort: 7286
          env:
            - name: ARGOS_SERVER_PORT
              value: "7285"
            - name: ARGOS_SERVER_GRPC_PORT
              value: "7286"
            - name: OTEL_SERVICE_NAME
              value: "argos"
            - name: OTEL_ENABLED_ARGOS
              value: "false"
            - name: ARIADNE_HOST
              value: ariadne
            - name: ARIADNE_GRPC_PORT
              value: "7261"
          readinessProbe:
            httpGet:
              path: /ready
              port: 7285
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /health
              port: 7285
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            limits:
              cpu: "1"
              memory: 1Gi
            requests:
              cpu: 250m
              memory: 512Mi
