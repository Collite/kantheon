---
# Source: health/templates/service.yaml
apiVersion: v1
kind: Service
metadata:
  name: health
  labels:
    app.kubernetes.io/name: health
    app.kubernetes.io/instance: health
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/version: "dev"
    helm.sh/chart: health-0.1.0
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: health
    app.kubernetes.io/instance: health
  ports:
    - name: http
      port: 7000
      targetPort: 7000
---
# Source: health/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: health
  labels:
    app.kubernetes.io/name: health
    app.kubernetes.io/instance: health
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/version: "dev"
    helm.sh/chart: health-0.1.0
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: health
      app.kubernetes.io/instance: health
  template:
    metadata:
      labels:
        app.kubernetes.io/name: health
        app.kubernetes.io/instance: health
    spec:
      containers:
        - name: health
          image: "health:dev"
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 7000
          env:
            - name: HEALTH_CHECK_SERVICE_PORT
              value: "7000"
            - name: OTEL_SERVICE_NAME
              value: "health-check-service"
            - name: OTEL_ENABLED_HEALTH
              value: "false"
          readinessProbe:
            httpGet:
              path: /health/all?threshold=0
              port: 7000
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /health/all?threshold=0
              port: 7000
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            limits:
              cpu: "1"
              memory: 512Mi
            requests:
              cpu: 100m
              memory: 192Mi
