---
# Source: echo-mcp/templates/service.yaml
apiVersion: v1
kind: Service
metadata:
  name: echo-mcp
  labels:
    app.kubernetes.io/name: echo-mcp
    app.kubernetes.io/instance: echo-mcp
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/version: "dev"
    helm.sh/chart: echo-mcp-0.1.0
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: echo-mcp
    app.kubernetes.io/instance: echo-mcp
  ports:
    - name: http
      port: 7267
      targetPort: 7267
---
# Source: echo-mcp/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: echo-mcp
  labels:
    app.kubernetes.io/name: echo-mcp
    app.kubernetes.io/instance: echo-mcp
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/version: "dev"
    helm.sh/chart: echo-mcp-0.1.0
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: echo-mcp
      app.kubernetes.io/instance: echo-mcp
  template:
    metadata:
      labels:
        app.kubernetes.io/name: echo-mcp
        app.kubernetes.io/instance: echo-mcp
    spec:
      containers:
        - name: echo-mcp
          image: "echo-mcp:dev"
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 7267
          env:
            - name: MCP_ECHO_SERVER_PORT
              value: "7267"
            - name: OTEL_SERVICE_NAME
              value: "echo-mcp"
            - name: OTEL_ENABLED_ECHO_MCP
              value: "false"
            - name: ECHO_GRPC_HOST
              value: echo
            - name: ECHO_GRPC_PORT
              value: "7266"
            - name: CAPABILITIES_MCP_URL
              value: http://capabilities-mcp:7501
          readinessProbe:
            httpGet:
              path: /ready
              port: 7267
            initialDelaySeconds: 2
            periodSeconds: 3
            failureThreshold: 20
          livenessProbe:
            httpGet:
              path: /health
              port: 7267
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            limits:
              cpu: 500m
              memory: 512Mi
            requests:
              cpu: 100m
              memory: 256Mi
