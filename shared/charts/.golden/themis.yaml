---
# Source: themis-mcp/templates/service.yaml
apiVersion: v1
kind: Service
metadata:
  name: themis-mcp
  labels:
    app.kubernetes.io/name: themis-mcp
    app.kubernetes.io/instance: themis
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/version: "dev"
    helm.sh/chart: themis-mcp-0.1.0
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: themis-mcp
    app.kubernetes.io/instance: themis
  ports:
