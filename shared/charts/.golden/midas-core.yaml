---
# Source: midas-core/templates/service.yaml
apiVersion: v1
kind: Service
metadata:
  name: midas-core
  labels:
    app.kubernetes.io/name: midas-core
    app.kubernetes.io/instance: midas-core
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/version: "dev"
    helm.sh/chart: midas-core-0.1.0
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: midas-core
    app.kubernetes.io/instance: midas-core
  ports:
    - name: http
      port: 7310
      targetPort: 7310
    - name: grpc
      port: 7311
      targetPort: 7311
---
# Source: midas-core/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: midas-core
  labels:
    app.kubernetes.io/name: midas-core
    app.kubernetes.io/instance: midas-core
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/version: "dev"
    helm.sh/chart: midas-core-0.1.0
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: midas-core
      app.kubernetes.io/instance: midas-core
  template:
    metadata:
      labels:
        app.kubernetes.io/name: midas-core
        app.kubernetes.io/instance: midas-core
    spec:
      containers:
        - name: midas-core
          image: "midas-core:dev"
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 7310
            - name: grpc
              containerPort: 7311
          env:
            - name: MIDAS_CORE_HTTP_PORT
              value: "7310"
            - name: MIDAS_CORE_MCP_PORT
              value: "7311"
            - name: MIDAS_DB_HOST
              value: "postgres"
            - name: MIDAS_DB_NAME
              value: "midas"
            - name: MIDAS_DB_USER
              value: "midas_app"
            - name: MIDAS_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: midas-db-secret
                  key: password
            - name: OTEL_SERVICE_NAME
              value: "midas-core"
            - name: OTEL_ENABLED_MIDAS_CORE
              value: "false"
            - name: CAPABILITIES_MCP_URL
              value: http://capabilities-mcp:7099
          readinessProbe:
            httpGet:
              path: /ready
              port: 7310
            initialDelaySeconds: 2
            periodSeconds: 3
            failureThreshold: 20
          livenessProbe:
            httpGet:
              path: /health
              port: 7310
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            limits:
              cpu: "2"
              memory: 2Gi
            requests:
              cpu: 500m
              memory: 1Gi
