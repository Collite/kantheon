metadata:
  name: golem
  labels:
    app.kubernetes.io/name: golem
    app.kubernetes.io/instance: golem
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/version: "dev"
    helm.sh/chart: golem-0.1.0
spec:
  type: ClusterIP
