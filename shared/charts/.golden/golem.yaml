---
# Source: golem/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: golem
  labels:
    app.kubernetes.io/name: golem
    app.kubernetes.io/instance: golem
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/version: "dev"
    helm.sh/chart: golem-0.1.0
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: golem
      app.kubernetes.io/instance: golem
  template:
    metadata:
      labels:
        app.kubernetes.io/name: golem
        app.kubernetes.io/instance: golem
    spec:
      containers:
        - name: golem
          image: "golem:dev"
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 7420
          env:
            - name: GOLEM_HTTP_PORT
              value: "7420"
            - name: GOLEM_DB_ENABLED
              value: "false"
            - name: OTEL_SERVICE_NAME
              value: "golem"
            - name: OTEL_ENABLED_GOLEM
              value: "false"
          readinessProbe:
            httpGet:
              path: /ready
              port: 7420
            initialDelaySeconds: 2
            periodSeconds: 3
            failureThreshold: 20
          livenessProbe:
            httpGet:
              path: /health
              port: 7420
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            limits:
              cpu: 1000m
              memory: 1Gi
            requests:
              cpu: 250m
              memory: 512Mi
