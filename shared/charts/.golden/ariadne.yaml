---
# Source: ariadne/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ariadne
  labels:
    app.kubernetes.io/name: ariadne
    app.kubernetes.io/instance: ariadne
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/version: "dev"
    helm.sh/chart: ariadne-0.1.0
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ariadne
      app.kubernetes.io/instance: ariadne
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ariadne
        app.kubernetes.io/instance: ariadne
    spec:
      containers:
        - name: ariadne
          image: "ariadne:dev"
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 7260
            - name: grpc
              containerPort: 7261
          env:
            - name: ARIADNE_HTTP_PORT
              value: "7260"
            - name: ARIADNE_GRPC_PORT
              value: "7261"
            - name: METADATA_GIT_REMOTE_URI
              value: "https://github.com/DFPartner/ai-models.git"
            - name: OTEL_SERVICE_NAME
              value: "ariadne"
            - name: OTEL_ENABLED_ARIADNE
              value: "false"
            - name: METADATA_GIT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: ariadne-github-pat
                  key: token
                  optional: true
            - name: PROMPTS_GIT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: ariadne-github-pat
                  key: token
                  optional: true
          readinessProbe:
            httpGet:
              path: /ready
              port: 7260
            initialDelaySeconds: 2
            periodSeconds: 3
            failureThreshold: 20
          livenessProbe:
            httpGet:
              path: /health
              port: 7260
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            limits:
              cpu: "1"
              memory: 1Gi
            requests:
              cpu: 250m
              memory: 512Mi
