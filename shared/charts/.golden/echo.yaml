---
# Source: echo/templates/service.yaml
apiVersion: v1
kind: Service
metadata:
  name: echo
  labels:
    app.kubernetes.io/name: echo
    app.kubernetes.io/instance: echo
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/version: "dev"
    helm.sh/chart: echo-0.1.0
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: echo
    app.kubernetes.io/instance: echo
  ports:
    - name: http
      port: 7265
      targetPort: 7265
    - name: grpc
      port: 7266
      targetPort: 7266

---
# Source: echo/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: echo
  labels:
    app.kubernetes.io/name: echo
    app.kubernetes.io/instance: echo
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/version: "dev"
    helm.sh/chart: echo-0.1.0
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: echo
      app.kubernetes.io/instance: echo
  template:
    metadata:
      labels:
        app.kubernetes.io/name: echo
        app.kubernetes.io/instance: echo
    spec:
      containers:
        - name: echo
          image: "echo:dev"
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 7265
            - name: grpc
              containerPort: 7266
          env:
            - name: ECHO_HTTP_PORT
              value: "7265"
            - name: ECHO_GRPC_PORT
              value: "7266"
            - name: OTEL_SERVICE_NAME
              value: "echo"
            - name: OTEL_ENABLED_ECHO
              value: "false"
          readinessProbe:
            httpGet:
              path: /ready
              port: 7265
            initialDelaySeconds: 2
            periodSeconds: 3
            failureThreshold: 20
          livenessProbe:
            httpGet:
              path: /health
              port: 7265
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            limits:
              cpu: "1"
              memory: 1Gi
            requests:
              cpu: 250m
              memory: 512Mi
