---
# Source: kallimachos-mcp/templates/service.yaml
apiVersion: v1
kind: Service
metadata:
  name: kallimachos-mcp
  labels:
    app.kubernetes.io/name: kallimachos-mcp
    app.kubernetes.io/instance: kallimachos-mcp
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/version: "dev"
    helm.sh/chart: kallimachos-mcp-0.1.0
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: kallimachos-mcp
    app.kubernetes.io/instance: kallimachos-mcp
  ports:
    - name: http
      port: 7262
      targetPort: 7262
---
# Source: kallimachos-mcp/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kallimachos-mcp
  labels:
    app.kubernetes.io/name: kallimachos-mcp
    app.kubernetes.io/instance: kallimachos-mcp
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/version: "dev"
    helm.sh/chart: kallimachos-mcp-0.1.0
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: kallimachos-mcp
      app.kubernetes.io/instance: kallimachos-mcp
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kallimachos-mcp
        app.kubernetes.io/instance: kallimachos-mcp
    spec:
      containers:
        - name: kallimachos-mcp
          image: "kallimachos-mcp:dev"
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 7262
          env:
            - name: KALLIMACHOS_MCP_PORT
              value: "7262"
            - name: OTEL_SERVICE_NAME
              value: "kallimachos-mcp"
            - name: OTEL_ENABLED_KALLIMACHOS_MCP
              value: "false"
            - name: KALLIMACHOS_MCP_KALLIMACHOS_HOST
              value: kallimachos
            - name: KALLIMACHOS_MCP_KALLIMACHOS_PORT
              value: "7261"
            - name: CAPABILITIES_MCP_URL
              value: http://capabilities-mcp:7501
          readinessProbe:
            httpGet:
              path: /ready
              port: 7262
            initialDelaySeconds: 2
            periodSeconds: 3
            failureThreshold: 20
          livenessProbe:
            httpGet:
              path: /health
              port: 7262
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            limits:
              cpu: 500m
              memory: 512Mi
            requests:
              cpu: 100m
              memory: 256Mi
