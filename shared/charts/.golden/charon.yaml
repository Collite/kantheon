---
# Source: charon/templates/service.yaml
apiVersion: v1
kind: Service
metadata:
  name: charon
  labels:
    app.kubernetes.io/name: charon
    app.kubernetes.io/instance: charon
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/version: "dev"
    helm.sh/chart: charon-0.1.0
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: charon
    app.kubernetes.io/instance: charon
  ports:
    - name: http
      port: 7250
      targetPort: 7250
    - name: grpc
      port: 7251
      targetPort: 7251
---
# Source: charon/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: charon
  labels:
    app.kubernetes.io/name: charon
    app.kubernetes.io/instance: charon
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/version: "dev"
    helm.sh/chart: charon-0.1.0
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: charon
      app.kubernetes.io/instance: charon
  template:
    metadata:
      labels:
        app.kubernetes.io/name: charon
        app.kubernetes.io/instance: charon
    spec:
      containers:
        - name: charon
          image: "charon:dev"
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 7250
            - name: grpc
              containerPort: 7251
          env:
            - name: CHARON_HTTP_PORT
              value: "7250"
            - name: CHARON_GRPC_PORT
              value: "7251"
            - name: OTEL_SERVICE_NAME
              value: "charon"
            - name: OTEL_ENABLED_CHARON
              value: "false"
            - name: CHARON_S3_ENDPOINT
              value: http://data-seaweedfs:8333
            - name: CHARON_REDIS_URL
              value: redis://data-redis:6379
            - name: CHARON_CONNECTIONS_PATH
              value: /etc/charon/connections.yaml
          envFrom:
            - secretRef:
                name: charon-db-credentials
                optional: true
          readinessProbe:
            httpGet:
              path: /ready
              port: 7250
            initialDelaySeconds: 2
            periodSeconds: 3
            failureThreshold: 20
          livenessProbe:
            httpGet:
              path: /health
              port: 7250
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            limits:
              cpu: 1000m
              memory: 1Gi
            requests:
              cpu: 250m
              memory: 512Mi
          volumeMounts:
            - name: connections
              mountPath: /etc/charon
              readOnly: true
      volumes:
        - name: connections
          configMap:
            name: charon-connections
