---
# Source: brontes/templates/service.yaml
apiVersion: v1
kind: Service
metadata:
  name: brontes
  labels:
    app.kubernetes.io/name: brontes
    app.kubernetes.io/instance: brontes
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/version: "dev"
    helm.sh/chart: brontes-0.1.0
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: brontes
    app.kubernetes.io/instance: brontes
  ports:
    - name: http
      port: 7295
      targetPort: 7295
    - name: grpc
      port: 7296
      targetPort: 7296

---
# Source: brontes/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: brontes
  labels:
    app.kubernetes.io/name: brontes
    app.kubernetes.io/instance: brontes
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/version: "dev"
    helm.sh/chart: brontes-0.1.0
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: brontes
      app.kubernetes.io/instance: brontes
  template:
    metadata:
      labels:
        app.kubernetes.io/name: brontes
        app.kubernetes.io/instance: brontes
    spec:
      containers:
        - name: brontes
          image: "brontes:dev"
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 7295
            - name: grpc
              containerPort: 7296
          env:
            - name: BRONTES_SERVER_PORT
              value: "7295"
            - name: BRONTES_SERVER_GRPC_PORT
              value: "7296"
            - name: OTEL_SERVICE_NAME
              value: "brontes"
            - name: OTEL_ENABLED_BRONTES
              value: "false"
            - name: PROTEUS_SERVER
              value: proteus
            - name: PROTEUS_SERVER_GRPC_PORT
              value: "7276"
          readinessProbe:
            httpGet:
              path: /ready
              port: 7295
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /health
              port: 7295
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            limits:
              cpu: "1"
              memory: 1Gi
            requests:
              cpu: 250m
              memory: 512Mi
