apiVersion: v1
kind: Service
metadata:
  name: hebe
  labels:
    app.kubernetes.io/name: hebe
    app.kubernetes.io/instance: hebe
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/version: "dev"
    helm.sh/chart: hebe-0.1.0
spec:
  type: ClusterIP
