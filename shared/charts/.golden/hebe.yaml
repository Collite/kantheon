---
# Source: hebe/templates/configmap.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: hebe-config
  labels:
    app.kubernetes.io/name: hebe
    app.kubernetes.io/instance: hebe
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/version: "dev"
    helm.sh/chart: hebe-0.1.0
data:
  config.toml: |
    profile = "k8s"
    instance_id = "dev"
---
# Source: hebe/templates/service.yaml
apiVersion: v1
kind: Service
metadata:
  name: hebe
  labels:
    app.kubernetes.io/name: hebe
    app.kubernetes.io/instance: hebe
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/version: "dev"
    helm.sh/chart: hebe-0.1.0
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: hebe
    app.kubernetes.io/instance: hebe
  ports:
    - name: http
      port: 8765
      targetPort: 8765
---
# Source: hebe/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hebe
  labels:
    app.kubernetes.io/name: hebe
    app.kubernetes.io/instance: hebe
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/version: "dev"
    helm.sh/chart: hebe-0.1.0
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: hebe
      app.kubernetes.io/instance: hebe
  template:
    metadata:
      labels:
        app.kubernetes.io/name: hebe
        app.kubernetes.io/instance: hebe
    spec:
      containers:
        - name: hebe
          image: "hebe:dev"
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8765
          env:
            
            - name: HOME # pin user.home so RunCommand's $HOME/.hebe/config.toml matches the mount path
              value: "/root"
            - name: HEBE_PROFILE
              value: "k8s"
            - name: HEBE_INSTANCE_ID
              value: "dev"
            - name: HEBE_SECRETS_DIR
              value: "/var/run/secrets/hebe"
            - name: OTEL_SERVICE_NAME
              value: "hebe"
            - name: OTEL_ENABLED_HEBE
              value: "false"
          readinessProbe:
            httpGet:
              path: /health
              port: 8765
            initialDelaySeconds: 3
            periodSeconds: 3
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /health
              port: 8765
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            limits:
              cpu: 1000m
              memory: 1Gi
            requests:
              cpu: 250m
              memory: 512Mi
          volumeMounts:
            - name: hebe-config
              mountPath: "/root/.hebe/config.toml"
              subPath: config.toml
              readOnly: true
      volumes:
        - name: hebe-config
          configMap:
            name: hebe-config
