---
# Source: metis/templates/service.yaml
apiVersion: v1
kind: Service
metadata:
  name: metis
  labels:
    app.kubernetes.io/name: metis
    app.kubernetes.io/instance: metis
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/version: "dev"
    helm.sh/chart: metis-0.1.0
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: metis
    app.kubernetes.io/instance: metis
  ports:
    - name: http
      port: 7260
      targetPort: 7260
    - name: grpc
      port: 7261
      targetPort: 7261
---
# Source: metis/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: metis
  labels:
    app.kubernetes.io/name: metis
    app.kubernetes.io/instance: metis
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/version: "dev"
    helm.sh/chart: metis-0.1.0
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: metis
      app.kubernetes.io/instance: metis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: metis
        app.kubernetes.io/instance: metis
    spec:
      containers:
        - name: metis
          image: "metis:dev"
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 7260
            - name: grpc
              containerPort: 7261
          env:
            - name: METIS_GRPC_PORT
              value: "7261"
            - name: METIS_HTTP_PORT
              value: "7260"
          readinessProbe:
            httpGet:
              path: /readyz
              port: 7260
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /healthz
              port: 7260
            initialDelaySeconds: 60
            periodSeconds: 15
          resources:
            limits:
              cpu: "2"
              memory: 4Gi
            requests:
              cpu: 500m
              memory: 1Gi
