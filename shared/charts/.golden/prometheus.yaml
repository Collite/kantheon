---
# Source: prometheus/templates/service.yaml
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/instance: prometheus
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/version: "dev"
    helm.sh/chart: prometheus-0.1.0
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/instance: prometheus
  ports:
    - name: http
      port: 7280
      targetPort: 7280
    - name: grpc
      port: 9090
      targetPort: 9090
---
# Source: prometheus/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/instance: prometheus
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/version: "dev"
    helm.sh/chart: prometheus-0.1.0
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: prometheus
      app.kubernetes.io/instance: prometheus
  template:
    metadata:
      labels:
        app.kubernetes.io/name: prometheus
        app.kubernetes.io/instance: prometheus
    spec:
      containers:
        - name: prometheus
          image: "prometheus:dev"
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 7280
            - name: grpc
              containerPort: 9090
          env:
            - name: PROMETHEUS_SERVER_PORT
              value: "7280"
            - name: POSTGRESQL_HOST
              value: "postgres"
            - name: POSTGRESQL_PORT
              value: "5432"
            - name: OTEL_SERVICE_NAME
              value: "prometheus"
            - name: AZURE_OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: prometheus-secrets
                  key: azure-openai-api-key
                  optional: true
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: prometheus-secrets
                  key: anthropic-api-key
                  optional: true
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 7280
            initialDelaySeconds: 15
            periodSeconds: 5
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 7280
            initialDelaySeconds: 45
            periodSeconds: 15
          resources:
            limits:
              cpu: "1"
              memory: 1536Mi
            requests:
              cpu: 250m
              memory: 768Mi
