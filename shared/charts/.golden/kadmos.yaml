---
# Source: kadmos/templates/service.yaml
apiVersion: v1
kind: Service
metadata:
  name: kadmos
  labels:
    app.kubernetes.io/name: kadmos
    app.kubernetes.io/instance: kadmos
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/version: "dev"
    helm.sh/chart: kadmos-0.1.0
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: kadmos
    app.kubernetes.io/instance: kadmos
  ports:
    - name: http
      port: 7270
      targetPort: 7270
---
# Source: kadmos/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kadmos
  labels:
    app.kubernetes.io/name: kadmos
    app.kubernetes.io/instance: kadmos
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/version: "dev"
    helm.sh/chart: kadmos-0.1.0
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: kadmos
      app.kubernetes.io/instance: kadmos
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kadmos
        app.kubernetes.io/instance: kadmos
    spec:
      containers:
        - name: kadmos
          image: "kadmos:dev"
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 7270
          env:
            - name: UVICORN_PORT
              value: "7270"
            - name: KADMOS_SERVICE_PORT
              value: "7270"
          readinessProbe:
            httpGet:
              path: /readyz
              port: 7270
            initialDelaySeconds: 2
            periodSeconds: 3
            failureThreshold: 20
          livenessProbe:
            httpGet:
              path: /healthz
              port: 7270
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            limits:
              cpu: "1"
              memory: 1Gi
            requests:
              cpu: 250m
              memory: 512Mi
