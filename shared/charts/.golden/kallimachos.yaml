---
# Source: kallimachos/templates/service.yaml
apiVersion: v1
kind: Service
metadata:
  name: kallimachos
  labels:
    app.kubernetes.io/name: kallimachos
    app.kubernetes.io/instance: kallimachos
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/version: "dev"
    helm.sh/chart: kallimachos-0.1.0
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: kallimachos
    app.kubernetes.io/instance: kallimachos
  ports:
    - name: http
      port: 7260
      targetPort: 7260
    - name: grpc
      port: 7261
      targetPort: 7261
---
# Source: kallimachos/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kallimachos
  labels:
    app.kubernetes.io/name: kallimachos
    app.kubernetes.io/instance: kallimachos
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/version: "dev"
    helm.sh/chart: kallimachos-0.1.0
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: kallimachos
      app.kubernetes.io/instance: kallimachos
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kallimachos
        app.kubernetes.io/instance: kallimachos
    spec:
      containers:
        - name: kallimachos
          image: "kallimachos:dev"
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 7260
            - name: grpc
              containerPort: 7261
          env:
            - name: KALLIMACHOS_PROBE_PORT
              value: "7260"
            - name: KALLIMACHOS_HTTP_PORT
              value: "7261"
            - name: OTEL_SERVICE_NAME
              value: "kallimachos"
            - name: OTEL_ENABLED_KALLIMACHOS
              value: "false"
            - name: KALLIMACHOS_STORAGE_PROFILE
              value: postgres
            - name: KALLIMACHOS_DB_URL
              value: jdbc:postgresql://kantheon-pg:5432/kallimachos
            - name: KALLIMACHOS_DB_USER
              value: kallimachos
          readinessProbe:
            httpGet:
              path: /ready
              port: 7260
            initialDelaySeconds: 2
            periodSeconds: 3
            failureThreshold: 20
          livenessProbe:
            httpGet:
              path: /health
              port: 7260
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            limits:
              cpu: 1000m
              memory: 1Gi
            requests:
              cpu: 250m
              memory: 512Mi
