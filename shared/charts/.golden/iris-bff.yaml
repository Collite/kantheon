---
# Source: iris-bff/templates/service.yaml
apiVersion: v1
kind: Service
metadata:
  name: iris-bff
  labels:
    app.kubernetes.io/name: iris-bff
    app.kubernetes.io/instance: iris-bff
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/version: "dev"
    helm.sh/chart: iris-bff-0.1.0
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: iris-bff
    app.kubernetes.io/instance: iris-bff
  ports:
    - name: http
      port: 7410
      targetPort: 7410
---
# Source: iris-bff/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: iris-bff
  labels:
    app.kubernetes.io/name: iris-bff
    app.kubernetes.io/instance: iris-bff
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/version: "dev"
    helm.sh/chart: iris-bff-0.1.0
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: iris-bff
      app.kubernetes.io/instance: iris-bff
  template:
    metadata:
      labels:
        app.kubernetes.io/name: iris-bff
        app.kubernetes.io/instance: iris-bff
    spec:
      containers:
        - name: iris-bff
          image: "iris-bff:dev"
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 7410
          env:
            - name: IRIS_BFF_HTTP_PORT
              value: "7410"
            - name: IRIS_DB_ENABLED
              value: "false"
            - name: IRIS_GOLEM_V2_BASE_URL
              value: "http://golem:7420"
            - name: IRIS_AUTH_VERIFY_SIGNATURE
              value: "false"
            - name: OTEL_SERVICE_NAME
              value: "iris-bff"
            - name: OTEL_ENABLED_IRIS_BFF
              value: "false"
          readinessProbe:
            httpGet:
              path: /ready
              port: 7410
            initialDelaySeconds: 2
            periodSeconds: 3
            failureThreshold: 20
          livenessProbe:
            httpGet:
              path: /health
              port: 7410
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            limits:
              cpu: 1000m
              memory: 1Gi
            requests:
              cpu: 250m
              memory: 512Mi
