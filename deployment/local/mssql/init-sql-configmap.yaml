apiVersion: v1
kind: ConfigMap
metadata:
  name: mssql-init-sql
  namespace: kantheon
  labels:
    app: mssql
    tier: local-infra
data:
  # Seed database for local Brontes (MSSQL worker) smoke/integration runs.
  # The connection_id `df-test` maps to this database in a local Kyklop overlay.
  init.sql: |
    IF DB_ID('kantheon_local') IS NULL
    BEGIN
        CREATE DATABASE kantheon_local;
    END
    GO
    USE kantheon_local;
    GO
    IF OBJECT_ID('dbo.sample_orders', 'U') IS NULL
    BEGIN
        CREATE TABLE dbo.sample_orders (
            id          INT          NOT NULL PRIMARY KEY,
            tenant_id   NVARCHAR(64) NOT NULL,
            region      NVARCHAR(64) NOT NULL,
            amount      DECIMAL(18,2) NOT NULL,
            created_at  DATETIME2    NOT NULL DEFAULT SYSUTCDATETIME()
        );
        INSERT INTO dbo.sample_orders (id, tenant_id, region, amount) VALUES
            (1, 't-alpha', 'EU',  100.00),
            (2, 't-alpha', 'US',  250.50),
            (3, 't-beta',  'EU',   42.00),
            (4, 't-beta',  'APAC', 999.99);
    END
    GO
