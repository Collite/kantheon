apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init-sql
  namespace: kantheon
  labels:
    app: postgres
    tier: local-infra
data:
  # Provision the `midas` database + `midas_app` role for local Midas-core.
  # Idempotent (safe to re-run): each object is created only if absent.
  # The role password arrives as the psql variable `pw` (from the init Job env,
  # sourced from the midas-db-secret) — never hardcoded here. `:'pw'` is
  # substituted by psql outside the dollar-quote and quoted via format(%L).
  #
  # midas_app OWNS the `midas` database so Flyway (run as midas_app in Stage 1.3)
  # can create the schema. The V0001 migration sets FORCE ROW LEVEL SECURITY so
  # the owner does not bypass RLS (contracts.md §6.4).
  init.sql: |
    SELECT format('CREATE ROLE midas_app LOGIN PASSWORD %L', :'pw')
    WHERE NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'midas_app')\gexec

    SELECT 'CREATE DATABASE midas OWNER midas_app'
    WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname = 'midas')\gexec

    ALTER DATABASE midas OWNER TO midas_app;
    GRANT ALL PRIVILEGES ON DATABASE midas TO midas_app;

    -- A BYPASSRLS role owns the materialized views (Stage 1.4), so their REFRESH —
    -- which runs as the view owner — can read across tenants. midas_app is FORCE-RLS
    -- bound and could not, and Flyway (run as midas_app) cannot grant itself
    -- BYPASSRLS, so this is provisioned here as the superuser. midas_app is made a
    -- member, so Flyway's V0002 can ALTER the MVs to this owner and midas-core can
    -- invoke REFRESH. Default privileges grant the owner SELECT on the tables
    -- midas_app creates (so the refresh query can read them).
    \c midas
    DO $$ BEGIN
      IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'midas_mv_owner') THEN
        CREATE ROLE midas_mv_owner BYPASSRLS NOLOGIN;
      END IF;
    END $$;
    GRANT midas_mv_owner TO midas_app;
    GRANT USAGE, CREATE ON SCHEMA public TO midas_mv_owner;
    GRANT SELECT ON ALL TABLES IN SCHEMA public TO midas_mv_owner;
    ALTER DEFAULT PRIVILEGES FOR ROLE midas_app IN SCHEMA public
      GRANT SELECT ON TABLES TO midas_mv_owner;
