apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: kantheon

resources:
  - deployment.yaml
  - service.yaml
  - init-sql-configmap.yaml
  - init-job.yaml

# Local-only credentials. This is disposable local-infra; the secrets never
# leave the dev cluster. Production Postgres credentials arrive via sealed
# secrets. `disableNameSuffixHash` keeps the names stable so midas-core's static
# `midas-db-secret` reference (agents/midas/core/k8s/base) resolves.
secretGenerator:
  - name: postgres-superuser-secret
    literals:
      - POSTGRES_PASSWORD=Local_Dev_Passw0rd!
    options:
      disableNameSuffixHash: true
  - name: midas-db-secret
    literals:
      - password=midas_local_dev
    options:
      disableNameSuffixHash: true
