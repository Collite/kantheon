name: Release Image (GHCR)

# Build a module's container image and push it to GitHub Container Registry
# (ghcr.io/collite/<module>:<version>). Adapted from ai-platform's
# release-service.yml, retargeted from ACR to GHCR.
#
# Two triggers:
#   1. push of a per-module tag `<module>/v<X.Y.Z>` (e.g. `themis/v0.5.0`)
#      -> builds just that module at that version.
#   2. workflow_dispatch ("Run workflow" button) -> pick a version (default
#      0.5.0) and `all` or a space-separated subset of modules. Use this to
#      (re)build a set on demand.
#
# Lane is auto-detected from the module directory:
#   Kotlin   -> Jib    (./gradlew :path:jib, multi-arch via CI=true)
#   Python   -> Docker (just build-py <path>; repo-root context for `COPY shared`)
#   Frontend -> Docker (just build-fe <name>; nginx static image, linux/amd64)
#
# Secrets:
#   GITHUB_TOKEN            - provided automatically; used for GHCR push and, by
#                            default, for reading the Collite/modeler TTR packages.
#   MODELER_PKG_USER/TOKEN  - optional; set these if GITHUB_TOKEN cannot read the
#                            Collite/modeler GitHub Packages (org.tatrman:ttr-*,
#                            needed by Ariadne + Proteus). See CLAUDE.md s7.3.

on:
  push:
    tags:
      - '*/v*'            # per-module image tags
      - '!shared/v*'      # shared libs are Maven artifacts, not images
      - '!shared-proto/v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (no leading v), e.g. 0.5.0'
        required: true
        default: '0.5.0'
      modules:
        description: '"all" for every deployable module, or a space-separated list (e.g. "themis charon iris")'
        required: true
        default: 'all'

env:
  REGISTRY: ghcr.io
  IMAGE_ORG: collite

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.plan.outputs.matrix }}
    steps:
      - uses: actions/checkout@v5
      - id: plan
        shell: bash
        run: |
          set -euo pipefail

          # Exact name -> buildable path map for the deployable (k8s-overlay) set.
          # Explicit on purpose: `midas` builds agents/midas/core, and `metis`
          # would otherwise match more than one directory.
          declare -A PATHS=(
            [golem]=agents/golem
            [hebe]=agents/hebe/modules/cli-app
            [iris-bff]=agents/iris-bff
            [midas]=agents/midas/core
            [pythia]=agents/pythia
            [sysifos-bff]=agents/sysifos-bff
            [themis]=agents/themis
            [iris]=frontends/iris
            [health]=infra/health
            [whois]=infra/whois
            [argos]=services/argos
            [ariadne]=services/ariadne
            [charon]=services/charon
            [echo]=services/echo
            [kadmos]=services/kadmos
            [kallimachos]=services/kallimachos
            [kyklop]=services/kyklop
            [metis]=services/metis
            [pinakes]=services/pinakes
            [prometheus]=services/prometheus
            [proteus]=services/proteus
            [report-renderer]=services/report-renderer
            [theseus]=services/theseus
            [arges]=workers/arges
            [brontes]=workers/brontes
            [steropes]=workers/steropes
          )
          ALL="golem hebe iris-bff midas pythia sysifos-bff themis iris health whois argos ariadne charon echo kadmos kallimachos kyklop metis pinakes prometheus proteus report-renderer theseus arges brontes steropes"

          declare -a NAMES
          if [ "${{ github.event_name }}" = "push" ]; then
            REF="${{ github.ref_name }}"
            NAME=$(echo "$REF" | rev | cut -d'/' -f2- | rev)
            VERSION=$(echo "$REF" | rev | cut -d'/' -f1 | rev | sed 's/^v//')
            NAMES=("$NAME")
          else
            VERSION="${{ github.event.inputs.version }}"
            if [ "${{ github.event.inputs.modules }}" = "all" ]; then
              read -r -a NAMES <<< "$ALL"
            else
              read -r -a NAMES <<< "${{ github.event.inputs.modules }}"
            fi
          fi

          ENTRIES=()
          for n in "${NAMES[@]}"; do
            [ -z "$n" ] && continue
            P="${PATHS[$n]:-}"
            if [ -z "$P" ]; then
              # Fallback for modules not in the map (future additions).
              P=$(find agents services workers tools frontends infra -maxdepth 4 -type d -name "$n" -print -quit 2>/dev/null || true)
            fi
            if [ -z "$P" ] || [ ! -d "$P" ]; then
              echo "::error::could not resolve a buildable path for module '$n'"
              exit 1
            fi
            ENTRIES+=("{\"name\":\"$n\",\"path\":\"$P\",\"version\":\"$VERSION\"}")
          done

          MATRIX="{\"include\":[$(IFS=,; echo "${ENTRIES[*]}")]}"
          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"
          echo "Planned build matrix:"; echo "$MATRIX"

  build:
    needs: setup
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.setup.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v5
      - uses: extractions/setup-just@v4

      - name: Detect lane
        id: lane
        shell: bash
        run: |
          set -euo pipefail
          P="${{ matrix.path }}"
          if [ -f "$P/pyproject.toml" ]; then LANE=python
          elif [ -f "$P/package.json" ]; then LANE=frontend
          else LANE=kotlin; fi
          echo "lane=$LANE" >> "$GITHUB_OUTPUT"
          echo "Module ${{ matrix.name }} ($P) -> $LANE @ ${{ matrix.version }}"

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ---------- Kotlin (Jib) ----------
      - uses: actions/setup-java@v5
        if: steps.lane.outputs.lane == 'kotlin'
        with: { distribution: temurin, java-version: '21' }
      - uses: gradle/actions/setup-gradle@v5
        if: steps.lane.outputs.lane == 'kotlin'
      - name: Gradle auth for Collite/modeler (TTR toolchain)
        if: steps.lane.outputs.lane == 'kotlin'
        env:
          GPR_USER: ${{ secrets.MODELER_PKG_USER != '' && secrets.MODELER_PKG_USER || github.actor }}
          GPR_TOKEN: ${{ secrets.MODELER_PKG_TOKEN != '' && secrets.MODELER_PKG_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p ~/.gradle
          printf 'gpr.user=%s\ngpr.token=%s\n' "$GPR_USER" "$GPR_TOKEN" >> ~/.gradle/gradle.properties
      - name: Build & push (Jib)
        if: steps.lane.outputs.lane == 'kotlin'
        env:
          CI: 'true'   # build files use this to emit a multi-arch (amd64+arm64) manifest
        run: |
          set -euo pipefail
          GRADLE_MODULE=":$(echo "${{ matrix.path }}" | sed 's#/#:#g')"
          ./gradlew "${GRADLE_MODULE}:jib" --no-configuration-cache \
            -Djib.to.image="${REGISTRY}/${IMAGE_ORG}/${{ matrix.name }}:${{ matrix.version }}" \
            -Djib.to.auth.username="${{ github.actor }}" \
            -Djib.to.auth.password="${{ secrets.GITHUB_TOKEN }}"

      # ---------- Python (Docker) ----------
      - uses: actions/setup-java@v5
        if: steps.lane.outputs.lane == 'python'
        with: { distribution: temurin, java-version: '21' }
      - uses: gradle/actions/setup-gradle@v5
        if: steps.lane.outputs.lane == 'python'
      - uses: actions/setup-python@v6
        if: steps.lane.outputs.lane == 'python'
        with: { python-version: '3.13' }
      - name: Install uv
        if: steps.lane.outputs.lane == 'python'
        run: pip install uv
      - name: Build & push (Python Docker)
        if: steps.lane.outputs.lane == 'python'
        shell: bash
        run: |
          set -euo pipefail
          IMG="${REGISTRY}/${IMAGE_ORG}/${{ matrix.name }}:${{ matrix.version }}"
          # build-py regenerates protos (proto-py), uv-syncs, and docker-builds
          # with repo-root context when the Dockerfile COPYs shared/. Tags <name>:dev.
          just build-py "${{ matrix.path }}"
          docker tag "${{ matrix.name }}:dev" "$IMG"
          docker push "$IMG"

      # ---------- Frontend (Docker, nginx) ----------
      - uses: actions/setup-node@v5
        if: steps.lane.outputs.lane == 'frontend'
        with: { node-version: '20' }
      - name: Build & push (Frontend Docker)
        if: steps.lane.outputs.lane == 'frontend'
        shell: bash
        run: |
          set -euo pipefail
          IMG="${REGISTRY}/${IMAGE_ORG}/${{ matrix.name }}:${{ matrix.version }}"
          just proto-ts            # envelope-ts bindings the Iris FE consumes
          just build-fe "${{ matrix.name }}"
          docker build --platform linux/amd64 -t "$IMG" "${{ matrix.path }}"
          docker push "$IMG"
