kleio {
    port = 7270
    port = ${?KLEIO_PORT}

    db {
        url = "jdbc:postgresql://kantheon-pg:5432/kleio"
        url = ${?KLEIO_DB_URL}
    }

    # The library.* RAG surface (graph-primary cited retrieval, RLS-scoped).
    kallimachos-mcp {
        host = "kallimachos-mcp"
        host = ${?KLEIO_KALLIMACHOS_MCP_HOST}
        port = 7262
        port = ${?KLEIO_KALLIMACHOS_MCP_PORT}
    }

    # Grounded synthesis egress.
    prometheus {
        host = "prometheus"
        host = ${?KLEIO_PROMETHEUS_HOST}
        port = 8080
        port = ${?KLEIO_PROMETHEUS_PORT}
        # Chat model for grounded synthesis (Prometheus routes by model id).
        model = "claude-sonnet-4-6"
        model = ${?KLEIO_PROMETHEUS_MODEL}
    }

    retrieval {
        k = 8
        k = ${?KLEIO_RETRIEVAL_K}
        # NO_GROUNDING threshold (the S2.3 min-score).
        min-score = 0.0
        min-score = ${?KLEIO_RETRIEVAL_MIN_SCORE}
    }
}
