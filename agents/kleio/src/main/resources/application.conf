kleio {
    port = 7270
    port = ${?KLEIO_PORT}

    db {
        url = "jdbc:postgresql://kantheon-pg:5432/kleio"
        url = ${?KLEIO_DB_URL}
    }

    # The library.* RAG surface (graph-primary cited retrieval, RLS-scoped).
    kallimachos-mcp {
        host = "kallimachos-mcp"
        host = ${?KLEIO_KALLIMACHOS_MCP_HOST}
        port = 7262
        port = ${?KLEIO_KALLIMACHOS_MCP_PORT}
    }

    # Grounded synthesis egress.
    llmgateway {
        host = "llm-gateway"
        host = ${?KLEIO_LLM_GATEWAY_HOST}
        port = 8080
        port = ${?KLEIO_LLM_GATEWAY_PORT}
        # Chat model for grounded synthesis (the LLM gateway routes by model id).
        model = "claude-sonnet-4-6"
        model = ${?KLEIO_LLM_GATEWAY_MODEL}
        # ttrk- gateway key — 2.0 /v1 is key-gated; provisioned from a k8s secret at deploy.
        api-key = ""
        api-key = ${?KLEIO_LLM_GATEWAY_KEY}
    }

    retrieval {
        k = 8
        k = ${?KLEIO_RETRIEVAL_K}
        # NO_GROUNDING threshold (the S2.3 min-score).
        min-score = 0.0
        min-score = ${?KLEIO_RETRIEVAL_MIN_SCORE}
    }
}
