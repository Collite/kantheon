apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: kantheon

# Local instance "dev". Provisioning a new instance = a sibling overlay with a
# different nameSuffix + HEBE_INSTANCE_ID + hebe-<id> Secret (provision.sh).
nameSuffix: -dev

resources:
  - ../../base

patches:
  - target:
      kind: Deployment
      name: hebe
    patch: |
      # Jib-loaded image — no registry pull on K3s.
      - op: replace
        path: /spec/template/spec/containers/0/imagePullPolicy
        value: Never
      - op: replace
        path: /spec/template/spec/containers/0/image
        value: hebe:local
      # Local cluster URLs (in-cluster PG / Keycloak / llm-gateway / iris-bff).
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: HEBE_BOUND_USER
          value: "bora"
