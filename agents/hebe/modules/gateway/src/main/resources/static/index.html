<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hebe Chat</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div id="app">
        <header class="header">
            <h1>Hebe Chat</h1>
            <div class="session-info">
                <span id="sessionId"></span>
            </div>
        </header>

        <main class="chat-container">
            <div id="messages" class="messages"></div>

            <div id="typingIndicator" class="typing-indicator hidden">
                <span></span><span></span><span></span>
            </div>
        </main>

        <footer class="input-container">
            <form id="messageForm" class="message-form">
                <textarea
                    id="messageInput"
                    placeholder="Type your message..."
                    rows="1"
                    autocomplete="off"
                ></textarea>
                <button type="submit" id="sendButton">Send</button>
            </form>
        </footer>

        <div id="approvalModal" class="modal hidden">
            <div class="modal-content">
                <h3>Approval Required</h3>
                <p id="approvalMessage"></p>
                <p class="approval-tool">Tool: <span id="approvalTool"></span></p>
                <div class="modal-buttons">
                    <button id="approveBtn" class="btn-approve">Approve</button>
                    <button id="denyBtn" class="btn-deny">Deny</button>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
