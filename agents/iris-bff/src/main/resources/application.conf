ktor {
    deployment {
        port = 7410
        port = ${?IRIS_BFF_HTTP_PORT}
    }
    application {
        modules = [ org.tatrman.kantheon.iris.ApplicationKt.module ]
    }
}

telemetry {
    enabled = false
    enabled = ${?OTEL_ENABLED_IRIS_BFF}
}

# Iris-BFF v1 (kantheon — Iris arc).
iris {
    # Postgres (Kantheon PG, `iris` database — kantheon-architecture §7.1).
    # Read at boot when iris.db.enabled = true; the in-memory store backs
    # unit/component tests and local boot without a database.
    db {
        enabled = false
        enabled = ${?IRIS_DB_ENABLED}
        type = "POSTGRES"
        host = "kantheon-postgres"
        host = ${?IRIS_DB_HOST}
        port = "5432"
        port = ${?IRIS_DB_PORT}
        database = "iris"
        database = ${?IRIS_DB_NAME}
        user = "iris"
        user = ${?IRIS_DB_USER}
        password = "iris"
        password = ${?IRIS_DB_PASSWORD}
    }

    auth {
        # When true, a JWKS-backed RS256 verifier validates the bearer signature +
        # iss/aud/exp before any claim is trusted (Stage 1.4). When false (local/dev
        # default), the bearer is decoded for sub/tenant + exp only — no signature
        # check. Either way a malformed/absent bearer 401s.
        verify-signature = false
        verify-signature = ${?IRIS_AUTH_VERIFY_SIGNATURE}
        # JWKS source: an explicit jwks-uri wins; otherwise it is derived from
        # keycloak-issuer as "<issuer>/protocol/openid-connect/certs".
        keycloak-issuer = ${?IRIS_AUTH_KEYCLOAK_ISSUER}
        jwks-uri = ${?IRIS_AUTH_JWKS_URI}
        audience = ${?IRIS_AUTH_AUDIENCE}
        # Claim names (Keycloak realm-dependent).
        tenant-claim = "tenant"
        tenant-claim = ${?IRIS_AUTH_TENANT_CLAIM}
        default-tenant = "default"
    }

    # Hash-chained audit (PD-8, contracts §3.1). The Ed25519 signing keypair is
    # loaded from this ref (a mounted K8s Secret file path, or inline PEM holding
    # both PRIVATE KEY + PUBLIC KEY blocks). Unset → an ephemeral dev keypair
    # (warning logged); a chain signed with an ephemeral key cannot be verified
    # across restarts, so production MUST set this.
    audit {
        signing-key-ref = ${?IRIS_AUDIT_SIGNING_KEY_REF}
    }

    # Themis routing edge (Phase 3 Stage 3.1, contracts §6). Every turn resolves
    # through `POST {base-url}/v1/resolve` before dispatch; the caller's bearer is
    # forwarded OBO. Unreachable → THEMIS_UNAVAILABLE error envelope (warn-and-fail
    # the turn, never the server).
    themis {
        base-url = "http://themis:8080"
        base-url = ${?IRIS_THEMIS_BASE_URL}
        timeout-ms = 10000
        timeout-ms = ${?IRIS_THEMIS_TIMEOUT_MS}
    }

    # Capabilities-mcp read mirror — display names + alternates for RoutingPickChip
    # labels (Phase 3). Best-effort: unreachable → chips fall back to the raw agent id.
    capabilities {
        base-url = "http://capabilities-mcp:8080"
        base-url = ${?IRIS_CAPABILITIES_BASE_URL}
    }

    # Pythia (the investigation inbox + submit, PD-2 / Pythia arc Stage 5.2). Blank →
    # FakePythiaClient (local/tests); a URL wires the live HTTP client over Pythia's
    # REST control surface (submit + per-user list; the SSE bridge feeds the inbox
    # lifecycle infra). The user's OBO bearer is forwarded — never service identity.
    pythia {
        url = ""
        url = ${?IRIS_PYTHIA_URL}
    }

    # Transitional new-golem /v2 dispatch (contracts §5). Deleted at Golem cutover.
    dispatch {
        golem-v2 {
            base-url = "http://golem-v2:8080"
            base-url = ${?IRIS_GOLEM_V2_BASE_URL}
        }
    }

    stream {
        # SSE idle heartbeat (`:heartbeat` comment frame) — keeps proxies from
        # reaping a long-running but quiet dispatch (contracts §2.3).
        heartbeat-s = 15
        heartbeat-s = ${?IRIS_STREAM_HEARTBEAT_S}
    }
}
