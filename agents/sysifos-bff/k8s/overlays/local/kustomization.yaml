apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: kantheon

resources:
  - ../../base

# Local cluster has no Alloy/Tempo endpoint — disable OTel export so the pod
# doesn't spam connection errors; pull the jib-built local image only. Signature
# verification is off locally (no Keycloak realm wired in dev).
patches:
  - target:
      kind: Deployment
      name: sysifos-bff
    patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: sysifos-bff
      spec:
        template:
          spec:
            containers:
              - name: sysifos-bff
                imagePullPolicy: Never
                env:
                  - name: OTEL_ENABLED_SYSIFOS_BFF
                    value: "false"
                  - name: SYSIFOS_AUTH_VERIFY_SIGNATURE
                    value: "false"
