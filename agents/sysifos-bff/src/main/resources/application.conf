# Sysifos-BFF v1 (kantheon — Sysifos arc). Phase 1 Stage 1.1 skeleton: only the
# HTTP port is read here; auth (JWKS), the Midas-core client, dictionaries, and
# the stream land in Stages 1.2–1.3.
sysifos-bff {
    http {
        port = 7601
        port = ${?SYSIFOS_BFF_HTTP_PORT}
    }

    # Auth (Stage 1.2) — Keycloak JWT verification + tenant claim forwarding.
    auth {
        verify-signature = false
        verify-signature = ${?SYSIFOS_AUTH_VERIFY_SIGNATURE}
        keycloak-issuer = ${?SYSIFOS_AUTH_KEYCLOAK_ISSUER}
        jwks-uri = ${?SYSIFOS_AUTH_JWKS_URI}
        audience = ${?SYSIFOS_AUTH_AUDIENCE}
        tenant-claim = "tenant"
        tenant-claim = ${?SYSIFOS_AUTH_TENANT_CLAIM}
        default-tenant = "default"
    }

    # Midas-core upstream (Stage 1.2). Every write proxies here; Sysifos has no DB.
    midas {
        base-url = "http://midas-core:7310"
        base-url = ${?SYSIFOS_MIDAS_BASE_URL}
    }

    # Excel loader upstream (Stage 2.5). The import lifecycle (upload/preview/commit)
    # proxies here; the loader batches to Midas-core itself.
    loader {
        base-url = "http://midas-excel-loader:7320"
        base-url = ${?SYSIFOS_LOADER_BASE_URL}
    }

    # SSE idle heartbeat — `SessionHeartbeat` every 30s (contracts §3.6).
    stream {
        heartbeat-s = 30
        heartbeat-s = ${?SYSIFOS_STREAM_HEARTBEAT_S}
    }
}

telemetry {
    enabled = false
    enabled = ${?OTEL_ENABLED_SYSIFOS_BFF}
}
