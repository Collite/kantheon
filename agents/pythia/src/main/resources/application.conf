ktor {
    deployment {
        port = 7090
        port = ${?PYTHIA_HTTP_PORT}
    }
    application {
        modules = [ org.tatrman.kantheon.pythia.ApplicationKt.module ]
    }
}

telemetry {
    enabled = false
    enabled = ${?OTEL_ENABLED_PYTHIA}
}

# Pythia — autonomous analytical investigator (kantheon arc).
pythia {
    # Inline-handle cap: results below this size inline to Postgres as a
    # PgResultSnapshot (divergence 1); larger results flag for materialise (P4).
    handles {
        inline-max-bytes = 1048576
        inline-max-bytes = ${?PYTHIA_HANDLES_INLINE_MAX_BYTES}
    }

    # AWAITING_* parking expiry (Stage 1.3 sweeper).
    awaiting {
        ttl-hours = 24
        ttl-hours = ${?PYTHIA_AWAITING_TTL_HOURS}
    }

    # NATS JetStream — live event stream + the coarse lifecycle subject (Stage 1.3).
    # Blank URL → degrade-to-PG-log-only (events are never lost, only not-live).
    nats {
        url = ""
        url = ${?PYTHIA_NATS_URL}
    }

    # Themis (INVESTIGATION_DEEP resolution). Blank → resolver runs the stub.
    themis {
        url = ""
        url = ${?PYTHIA_THEMIS_URL}
    }

    # LLM gateway (Prometheus) — the STRONG-tier planner / CHEAP-tier evaluator.
    # Blank host → planner runs the stub (local boot / tests).
    llm-gateway {
        host = ""
        host = ${?PYTHIA_LLM_GATEWAY_HOST}
        port = 8090
        port = ${?PYTHIA_LLM_GATEWAY_PORT}
        timeout-ms = 60000
        timeout-ms = ${?PYTHIA_LLM_GATEWAY_TIMEOUT_MS}
    }

    # capabilities-mcp read client — PlanValidator capability-existence checks.
    capabilities {
        url = ""
        url = ${?PYTHIA_CAPABILITIES_URL}
    }

    # theseus-mcp query edge (Stage 2.3).
    theseus {
        url = ""
        url = ${?PYTHIA_THESEUS_URL}
    }

    # Phase 4 data plane. Charon (services/charon) — Arrow data mover (gRPC-direct;
    # the MCP wrapper is not on Pythia's path). Blank host → the data plane is off
    # (SQL-only deployment): DataFrame/Model nodes fail closed, evidence isn't
    # persisted to Seaweed, the IN-list>500 path stays a PERMANENT materialise flag.
    charon {
        host = ""
        host = ${?PYTHIA_CHARON_HOST}
        port = 7070
        port = ${?PYTHIA_CHARON_PORT}
    }

    # Polars worker (Steropes) — DataFrameNode session DFs (gRPC-direct).
    worker {
        host = ""
        host = ${?PYTHIA_WORKER_HOST}
        port = 7060
        port = ${?PYTHIA_WORKER_PORT}
    }

    # Metis (services/metis) — ModelNode Fit/Project/Simulate/Diagnose (gRPC-direct,
    # Stage 4.2). Blank host → ModelNodes fail closed.
    metis {
        host = ""
        host = ${?PYTHIA_METIS_HOST}
        port = 7050
        port = ${?PYTHIA_METIS_PORT}
    }

    # Postgres (per-pod database `pythia`, kantheon-architecture §7.1). The
    # in-memory repositories back unit/component tests and local boot without a DB.
    db {
        enabled = false
        enabled = ${?PYTHIA_DB_ENABLED}
        type = "POSTGRES"
        host = "kantheon-postgres"
        host = ${?PYTHIA_DB_HOST}
        port = "5432"
        port = ${?PYTHIA_DB_PORT}
        database = "pythia"
        database = ${?PYTHIA_DB_NAME}
        user = "pythia"
        user = ${?PYTHIA_DB_USER}
        # No baked default — the secret must be supplied (PYTHIA_DB_PASSWORD). With
        # pythia.db.enabled=true and the env unset, boot fails loudly rather than
        # silently connecting with a hardcoded password.
        password = ${?PYTHIA_DB_PASSWORD}
    }
}
