ktor {
    deployment {
        port = 7420
        port = ${?GOLEM_HTTP_PORT}
    }
    application {
        modules = [ org.tatrman.kantheon.golem.ApplicationKt.module ]
    }
}

telemetry {
    enabled = false
    enabled = ${?OTEL_ENABLED_GOLEM}
}

# Golem template v1 (kantheon — Golem arc). One pod per Shem.
golem {
    # capabilities-mcp registration (Stage 2.2 T4). Blank → the Shem is not
    # registered (local boot / tests); env CAPABILITIES_MCP_URL overrides.
    capabilities {
        url = ""
        url = ${?CAPABILITIES_MCP_URL}
    }

    # Veles model graph — PackageContext (GetModel). The model is just the model;
    # host blank → the model is not loaded and the pod stays ready on the DB gate
    # alone (skeleton / local boot). Set per deployment.
    veles {
        host = ""
        host = ${?GOLEM_VELES_HOST}
        port = 7261
        port = ${?GOLEM_VELES_PORT}
    }
    # Mounted Shem bundle directory. <dir>/shem.yaml is the kantheon.shem/v1 overlay
    # (assembled at boot into the AgentCapability); <dir>/prompts/<locale>/* are the
    # prompts. No shem.yaml present → no Shem (skeleton boot). Set per-Shem via mount.
    shem {
        dir = "/etc/golem/shem"
        dir = ${?GOLEM_SHEM_DIR}
    }
    locale = "cs"
    locale = ${?GOLEM_LOCALE}
    # packages = []   # domain packages for GetModel; set per-Shem

    # LLM gateway (LLM gateway) — the PlanComposer's CHEAP-tier completions.
    llm-gateway {
        host = "llm-gateway"
        host = ${?GOLEM_LLM_GATEWAY_HOST}
        port = 8090
        port = ${?GOLEM_LLM_GATEWAY_PORT}
        timeout-ms = 60000
        timeout-ms = ${?GOLEM_LLM_GATEWAY_TIMEOUT_MS}
    }
    # query-mcp query edge (MCP streamable-HTTP) — the executor's QueryClient.
    query {
        url = "http://query-mcp:7152/mcp"
        url = ${?GOLEM_QUERY_URL}
    }

    # Clarification resume (Phase 3 Stage 3.2) — HMAC-signed resume tokens.
    resume {
        hmacSecret = "dev-secret-change-in-production"
        hmacSecret = ${?GOLEM_RESUME_HMAC_SECRET}
        ttlSeconds = 300
        ttlSeconds = ${?GOLEM_RESUME_TOKEN_TTL_SECONDS}
    }

    # Format pipeline (Phase 3 Stage 3.1) — chips + chart-on-compare flags (§10 Δ2/Δ5).
    format {
        # Fire a chart when an AMEND adds a second value for an axis the prior turn had.
        chartOnCompare = true
        chartOnCompare = ${?GOLEM_CHART_ON_COMPARE_ENABLED}
        # Top up chips via a CHEAP LLM call only when fewer than this many chips exist.
        chipMinBeforeTopup = 2
        chipMinBeforeTopup = ${?GOLEM_CHIP_MIN_BEFORE_TOPUP}
        # Disable the LLM chip top-up entirely (heuristic + pattern-derived chips only).
        chipLlmTopupEnabled = true
        chipLlmTopupEnabled = ${?GOLEM_CHIP_LLM_TOPUP_ENABLED}
        # Hard budget for the cosmetic chip top-up call — kept well below the planner
        # timeout so a slow gateway can't stall the render path for optional chips.
        chipTopupTimeoutMs = 1500
        chipTopupTimeoutMs = ${?GOLEM_CHIP_TOPUP_TIMEOUT_MS}
    }

    # Postgres (per-pod database, kantheon-architecture §7.1; schema per Shem).
    # Read at boot when golem.db.enabled = true; the in-memory repository backs
    # unit/component tests and local boot without a database.
    db {
        enabled = false
        enabled = ${?GOLEM_DB_ENABLED}
        type = "POSTGRES"
        host = "kantheon-postgres"
        host = ${?GOLEM_DB_HOST}
        port = "5432"
        port = ${?GOLEM_DB_PORT}
        database = "golem"
        database = ${?GOLEM_DB_NAME}
        user = "golem"
        user = ${?GOLEM_DB_USER}
        password = "golem"
        password = ${?GOLEM_DB_PASSWORD}
    }
}
