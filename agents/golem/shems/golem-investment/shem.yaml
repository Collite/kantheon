# Golem-investment Shem — the Midas investment-Q&A Golem ("Investment").
#
# CONVERGED DESIGN (2026-06-25), mirrors golem-ucetnictvi. A Golem's capabilities/v1
# AgentCapability is ASSEMBLED at boot — this overlay is the thin per-agent residue:
#
#   (1) ai-models agent definition  → identity + model slice (areas → packages)
#   (2) Veles model (by package)  → area_entities / preferred_queries / area_terminology
#   (3) THIS overlay                → the per-agent residue kantheon owns
#   (4) Golem-template constants    → agent_kind, intent_kinds, capability_refs, hitl, endpoint
#
# Prompts belong to the Shem (./prompts), NOT to the model.
#
# Vocabulary: "area" (subject area), not "domain" — domain is now a TTR value concept.
# This file applies the AREA_QA rename (overview §0): agent_kind/area_name/area_entities/
# area_terminology are NOT authored here — they are template constants / Veles-derived.

apiVersion: kantheon.shem/v1
kind: golem-shem

# ── (1) Identity + model slice — sourced from the ai-models agent definition ──
# Golem reads ai-models agents/investment.yaml and asks Veles ResolveArea(investment)
# → packages; GetModel(packages) supplies the model (entities clients/portfolios/assets/
# transactions/mv_position_current + the curated q.midas.* pattern queries).
source:
  repo: ai-models
  agentDef: agents/investment.yaml
  id: investment                 # ai-models agent id → kantheon agent_id = golem-investment
  label: "Investment Q&A"        # ai-models label → display_name
  areas: [investment]            # Veles ResolveArea → investment packages

# ── Derived / constant (DO NOT author — shown for reference only) ──
#   agent_id          golem-investment      (golem-<id>)
#   display_name      "Investment Q&A"      (ai-models label)
#   agent_kind        AREA_QA               (template constant for kind: golem)
#   intent_kinds      [PROCEDURAL]          (template constant; RCA/FORECAST/SIMULATION → Pythia)
#   service_endpoint  http://golem-investment.kantheon.svc.cluster.local:7420
#   health_check_path /health
#   capability_refs / preferred_capabilities  query.query, query.compile, render.table, render.chart
#   hitl_default      INTERACTIVE
#   area_entities / preferred_queries / area_terminology  from the Veles model — NOT listed here
#     (the investment glossary — ROI/TWR/MWR/NAV/FIFO/Realised+Unrealised P&L/Base currency — is
#      authored as entity descriptions/aliases in the ai-models investment model, NOT in this overlay)

# ── (3) Overlay — the per-agent residue kantheon owns ──
overlay:
  # Entitlement: a Keycloak realm role. Empty list = visible to every authenticated caller.
  # Convention: kantheon-area-<area>.
  visibility_roles:
    - kantheon-area-investment

  # Per-Shem tool capability refs, appended to the template refs (query.query/compile,
  # render.table/chart) by the assembler. Midas-core's calc surface — the Golem calls these
  # for returns / cost-basis / fees / reconciliation, so they ride the registered manifest.
  capability_refs:
    - midas.portfolio.performance:v1
    - midas.position.valuation:v1
    - midas.position.cost_basis:v1
    - midas.transaction.fee_allocation:v1
    - midas.reconcile.statement:v1

  # OPTIONAL router seed. If omitted, description_for_router is seeded from the area's
  # description + tags served by Veles.
  description_for_router: |
    Investment portfolio Q&A — procedural questions about a client's portfolios: current
    positions and valuation, performance (returns, realised/unrealised P&L), transaction
    history, dividends, fees and FX exposure. Reads the kantheon-owned operational Postgres
    via query; uses Midas-core calc tools for time-/money-weighted returns. NOT root-cause
    analysis / forecasting / simulation (→ Pythia), nor other subject areas (HR, Sales).

  # OPTIONAL routing examples. If omitted, sourced from the routing/eval corpus.
  example_questions:
    - "What's the YTD return on the Smith portfolio?"
    - "Show me current positions for client X."
    - "What were the dividends paid in Q1?"
    - "What's the unrealised P&L on my AAPL holdings?"
    - "How much did I pay in fees last year?"
  counter_examples:
    - "Show me HR headcount."                  # → Golem-HR
    - "What's our pipeline this quarter?"       # → Golem-Sales
    - "Why did the system latency spike?"       # RCA → Pythia

  # OPTIONAL locale defaults. If omitted, template defaults apply. v1: en + cs.
  locale_defaults:
    - locale: en
      greeting: "Hi, how can I help with your portfolios?"
      date_format: "yyyy-MM-dd"
      currency: "EUR"
    - locale: cs-CZ
      greeting: "Dobrý den, jak vám mohu pomoci s portfolii?"
      date_format: "dd.MM.yyyy"
      currency: "CZK"
