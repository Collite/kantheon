# Golem-ucetnictvi Shem — the first Kantheon Golem (accounting / "Účetnictví").
#
# CONVERGED DESIGN (2026-06-25). A Golem's capabilities/v1 AgentCapability is
# ASSEMBLED at boot — it is no longer a single hand-curated rich file:
#
#   (1) ai-models agent definition  → identity + model slice (areas → packages)
#   (2) Veles model (by package)  → area_entities / preferred_queries / area_terminology
#   (3) THIS overlay                → the per-agent residue kantheon owns
#   (4) Golem-template constants    → agent_kind, intent_kinds, capability_refs, hitl, endpoint
#
# Prompts belong to the Shem (./prompts), NOT to the model — seeded verbatim from
# ai-models/prompts/golem/{cs,en} (the source of truth for prompt edits stays there
# until the per-Shem prompt-ownership cutover; see docs/architecture/golem §4.1).
#
# Vocabulary: "area" (subject area), not "domain" — domain is now a TTR value concept.

apiVersion: kantheon.shem/v1
kind: golem-shem

# ── (1) Identity + model slice — sourced from the ai-models agent definition ──
# Golem reads ai-models agents/ucetnictvi.yaml and asks Veles ResolveArea(accounting)
# → packages [obchodni_doklady, ucetnictvi]; GetModel(packages) supplies the model.
source:
  repo: ai-models
  agentDef: agents/ucetnictvi.yaml
  id: ucetnictvi                 # ai-models agent id → kantheon agent_id = golem-ucetnictvi
  label: "Účetnictví"            # ai-models label → display_name (carried here; Golem has no ai-models client)
  areas: [accounting]            # Veles ResolveArea → [obchodni_doklady, ucetnictvi]

# ── Derived / constant (DO NOT author — shown for reference only) ──
#   agent_id          golem-ucetnictvi      (golem-<id>)
#   display_name      "Účetnictví"          (ai-models label)
#   agent_kind        AREA_QA               (template constant for kind: golem)
#   intent_kinds      [PROCEDURAL]          (template constant; RCA/FORECAST/SIMULATION → Pythia)
#   service_endpoint  http://golem-ucetnictvi.kantheon.svc.cluster.local:7420
#   health_check_path /health
#   capability_refs / preferred_capabilities  query.query, query.compile, render.table, render.chart
#   hitl_default      INTERACTIVE
#   typical_latency_ms / typical_cost_usd     measured (Stage 4.x)
#   area_entities / preferred_queries / area_terminology  from the Veles model — NOT listed here

# ── (3) Overlay — the per-agent residue kantheon owns ──
overlay:
  # Entitlement: a Keycloak realm role (realm_access.roles). Customer user-groups are
  # mapped onto this role IN Keycloak, never in this file — keeps the Shem portable.
  # Empty list = visible to every authenticated caller. Convention: kantheon-area-<area>.
  visibility_roles:
    - kantheon-area-accounting

  # OPTIONAL router seed. If omitted, description_for_router is seeded from the area's
  # description + tags served by Veles (accounting: "Účetnictví a navazující obchodní
  # doklady", tags: [finance]).
  description_for_router: |
    Účetnictví a navazující obchodní doklady — procedurální dotazy nad účetními a
    obchodními entitami (účty, období, hodnoty, doklady). Nikoli analýza příčin /
    predikce / simulace (→ Pythia), ani jiné oblasti.

  # OPTIONAL routing examples. If omitted, sourced from the routing/eval corpus.
  example_questions:
    - "Jaká je účetní hodnota na středisku 4902 za toto období?"
    - "Ukaž zůstatky účtů za minulý měsíc"
    - "Které doklady ještě nejsou zaúčtované?"
  counter_examples:
    - "Proč klesla marže ve druhém čtvrtletí?"   # RCA → Pythia
    - "Kolik zaměstnanců nastoupilo v červnu?"    # HR area → another Golem (future)

  # OPTIONAL locale defaults. If omitted, template defaults apply. v1: cs-CZ + en.
  locale_defaults:
    - locale: cs-CZ
      greeting: "Dobrý den, jak vám mohu pomoci?"
      date_format: "dd.MM.yyyy"
      currency: "CZK"
    - locale: en
      greeting: "Hi, how can I help?"
      date_format: "yyyy-MM-dd"
      currency: "EUR"
