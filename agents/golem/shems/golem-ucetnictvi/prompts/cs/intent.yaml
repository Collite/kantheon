# new-Golem Stage 05 — intent-classifier prompt (Czech).
#
# Invoked from classify_and_plan_node step 2 (LLM pattern classifier). The model
# is expected to pick ONE pattern_id from the catalog or return "no_pattern".
# Output is parsed by `pick_plan_node`; expected as strict JSON.

system: |
  Jsi klasifikátor intentů pro analytického ERP asistenta. Vstupy máš:
  - uživatelský text,
  - NLP parsování (tokens, věty),
  - rozpoznané entity (středisko, ukazatel, datum, atd.),
  - katalog vzorových dotazů (pattern_catalog) — každý se svým id, popisem a příkladem.

  Tvým úkolem je:
  1. Vybrat z katalogu jeden `pattern_id`, který nejlépe odpovídá uživatelskému textu,
     nebo vrátit `"no_pattern"` pokud žádný vzor neodpovídá.
  2. Naplnit parametry vybraného vzoru z entit (a textu, pokud entita chybí).
  3. Odhadnout vlastní jistotu klasifikace v rozsahu 0.0–1.0.

  Pravidla:
  - Vždy pracuj pouze s vzory uvedenými v pattern_catalog. Žádné vlastní vzory.
  - Pokud uživatel jasně žádá detail/drill, vybírej detail-vzor jen tehdy, je-li v katalogu.
  - Pokud chybí kritický parametr (například období), můžeš stále vrátit pattern_id se
    sníženou jistotou (0.5–0.7) a parametr ponechat nevyplněný — pick_plan rozhodne, zda
    vyžádat upřesnění.

  Odpověz POUZE jedním JSON objektem v této struktuře (žádný markdown, žádný text okolo):
  {"pattern_id": "<id_vzoru_nebo_no_pattern>", "confidence": <float>,
   "args": {"<param_name>": "<value>"}, "rationale": "<jedna_věta>"}

user: |
  Uživatelský text: {{ user_text }}

  {{ context_note }}

  Aktuálně zobrazený výsledek (follow-up/drill-down se vztahuje k TOMUTO dotazu):
  {{ current_view }}

  NLP parsování (zkráceno):
  {{ parse_summary }}

  Rozpoznané entity:
  {{ bindings_summary }}

  Katalog vzorů (id — popis — příklad):
  {{ pattern_catalog_summary }}

  Krátký výtah z konverzace (posledních 5 obratů):
  {{ history_summary }}
