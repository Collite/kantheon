apiVersion: v2
name: golem
description: |
  The Kantheon golem agent — an env-agnostic Helm chart. Holds no cluster knowledge: image,
  replicas, resources, the Postgres connection (host/port/db/user + password secret) and
  telemetry are all values. Per-environment values live in the deploying GitOps repo (Olymp),
  wired via ArgoCD multi-source (D3').
type: application
version: 0.1.0
appVersion: "dev"
