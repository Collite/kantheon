apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: kantheon

resources:
  - ../../base

patches:
  - target:
      kind: Deployment
      name: midas-excel-loader
    patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: midas-excel-loader
      spec:
        template:
          spec:
            containers:
              - name: midas-excel-loader
                imagePullPolicy: Never
                env:
                  - name: OTEL_ENABLED_MIDAS_EXCEL_LOADER
                    value: "false"
