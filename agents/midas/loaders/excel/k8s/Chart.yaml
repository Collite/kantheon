apiVersion: v2
name: midas-excel-loader
description: |
  The Kantheon midas-excel-loader — an env-agnostic Helm chart. Holds no cluster knowledge:
  image, replicas, resources, telemetry, the blob scratch volume and the midas-core upstream
  are all values. Per-environment values live in the deploying GitOps repo (Olymp), wired via
  ArgoCD multi-source (D3'). Converted from the kustomize base/overlays (D2).
type: application
version: 0.1.0
appVersion: "dev"
# Common Deployment/Service shape from the kantheon-service library chart (D1). Path is five
# deep: agents/midas/loaders/excel/k8s.
dependencies:
  - name: kantheon-service
    version: 0.1.0
    repository: "file://../../../../../shared/charts/kantheon-service"
