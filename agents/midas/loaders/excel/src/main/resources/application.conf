excel-loader {
    http {
        # 7315 — Ktor HTTP: upload/preview/commit (Stage 1.5) + probes.
        port = 7315
        port = ${?EXCEL_LOADER_HTTP_PORT}
    }

    # Midas-core write API (Stage 1.5 commit path). The loader writes
    # transactions through Midas-core, never directly to the DB.
    midas-core {
        base-url = "http://midas-core:7310"
        base-url = ${?MIDAS_CORE_BASE_URL}
    }

    # Uploaded statement blobs (re-parsed for preview/commit). FS path in v1
    # (contracts §6.1 `upload_blob_ref`); S3 later. Cleaned after 24h (T7).
    blob {
        dir = "/var/lib/midas-loader/blobs"
        dir = ${?EXCEL_LOADER_BLOB_DIR}
        # In-process retention sweep (T7 — the v1 "cron"; S3 lifecycle in v1.x).
        ttl-hours = 24
        ttl-hours = ${?EXCEL_LOADER_BLOB_TTL_HOURS}
        sweep-interval-minutes = 60
        sweep-interval-minutes = ${?EXCEL_LOADER_BLOB_SWEEP_INTERVAL_MINUTES}
    }

    # Validate-only bearer auth (shared kantheon posture; signature NOT verified yet
    # — see api/Auth.kt). The bearer is forwarded on-behalf-of to Midas-core.
    auth {
        tenant-claim = "tenant"
        tenant-claim = ${?EXCEL_LOADER_AUTH_TENANT_CLAIM}
        default-tenant = "default"
        default-tenant = ${?EXCEL_LOADER_AUTH_DEFAULT_TENANT}
    }
}
