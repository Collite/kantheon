midas-core {
    http {
        # 7310 — Ktor HTTP (Netty): REST write/read API (Stage 1.3) + probes +
        # /metrics. K8s Service `midas-core` exposes 7310.
        port = 7310
        port = ${?MIDAS_CORE_HTTP_PORT}
    }

    mcp {
        # 7311 — MCP tool surface at /mcp (Stage 1.4, CIO). A second listener in
        # the same process (the REST error-envelope stack and the MCP base stack
        # can't share one Ktor application). Service `midas-core` exposes 7311.
        port = 7311
        port = ${?MIDAS_CORE_MCP_PORT}
        # The service_endpoint advertised to capabilities-mcp (manifests carry the
        # same value; this is informational for logs).
        advertised-endpoint = "http://midas-core:7311"
        advertised-endpoint = ${?MIDAS_CORE_MCP_ADVERTISED_ENDPOINT}
    }

    # Operational Postgres — the shared Kantheon PG (kantheon-architecture §7.1),
    # `midas` database. Provisioned by deployment/local (Stage 1.1 T5). Keys match
    # shared db-common `DatabaseConnection` (type/host/port/database/user/password).
    db {
        type = "POSTGRES"
        host = "postgres"
        host = ${?MIDAS_DB_HOST}
        port = "5432"
        port = ${?MIDAS_DB_PORT}
        database = "midas"
        database = ${?MIDAS_DB_NAME}
        user = "midas_app"
        user = ${?MIDAS_DB_USER}
        password = "midas_local_dev"
        password = ${?MIDAS_DB_PASSWORD}
    }

    # Auth — validate-only at v1 (decode sub/tenant/realm_access.roles + exp),
    # the constellation-wide `kantheon` Keycloak realm. JWKS signature
    # verification is NOT implemented yet — it is a real code change (fetch JWKS,
    # verify RS256, validate iss/aud), not a flag flip. Setting verify-signature =
    # true currently fails fast at startup so it cannot give a false sense of
    # security; leave it false until the JWKS path is wired.
    auth {
        tenant-claim = "tenant"
        tenant-claim = ${?MIDAS_AUTH_TENANT_CLAIM}
        default-tenant = "default"
        verify-signature = false
        verify-signature = ${?MIDAS_AUTH_VERIFY_SIGNATURE}
        keycloak-issuer = ${?MIDAS_AUTH_KEYCLOAK_ISSUER}
    }

    # capabilities-mcp registration (Stage 1.4). Warn-and-continue is built into
    # the shared capabilities-client; the endpoint is env-overridable per cluster.
    capabilities {
        url = "http://capabilities-mcp:7099"
        url = ${?CAPABILITIES_MCP_URL}
    }
}
