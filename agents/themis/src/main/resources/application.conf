server {
  port = 7901
  host = "0.0.0.0"
}

# HOCON `${?VAR}` substitution: if the env var is unset, the line is dropped
# and the preceding value wins. Env vars exist as escape hatches so the K8s
# overlays can point at ai-platform services without rebuilding the image.
themis {
  // fork Stage 2.6 switch-over: Themis now calls the in-repo kantheon engines'
  // REST APIs directly — Kadmos /v1/analyze (was ai-platform nlp-service:8000)
  // and Echo /match (was fuzzy-mcp:7143). NLP_*/FUZZY_* env names kept stable.
  nlp {
    host = "kadmos"
    host = ${?NLP_MCP_HOST}
    port = 7270
    port = ${?NLP_MCP_PORT}
    timeout-ms = 30000
    timeout-ms = ${?NLP_MCP_TIMEOUT_MS}
  }

  fuzzy {
    host = "echo"
    host = ${?FUZZY_MCP_HOST}
    port = 7265
    port = ${?FUZZY_MCP_PORT}
    timeout-ms = 15000
    timeout-ms = ${?FUZZY_MCP_TIMEOUT_MS}
  }

  // fork Stage 2.5: the LLM gateway is now in-repo Prometheus (was ai-platform
  // llm-gateway:8090). HTTP port 7280. Env overrides unchanged.
  llm-gateway {
    host = "prometheus"
    host = ${?LLM_GATEWAY_HOST}
    port = 7280
    port = ${?LLM_GATEWAY_PORT}
    timeout-ms = 60000
    timeout-ms = ${?LLM_GATEWAY_TIMEOUT_MS}
  }

  // capabilities-mcp registry — routeToAgent reads agent manifests (Stage 3.3).
  capabilities {
    host = "capabilities-mcp"
    host = ${?CAPABILITIES_MCP_HOST}
    port = 7501
    port = ${?CAPABILITIES_MCP_PORT}
    timeout-ms = 5000
    timeout-ms = ${?CAPABILITIES_MCP_TIMEOUT_MS}
  }

  hmac {
    secret-key = ${?HMAC_SECRET_KEY}
  }

  cache {
    nlp-lru-size = 1000
    resolution-lru-size = 1000
  }

  hitl {
    confidence-threshold = 0.75
    max-rounds = 3
  }

  eval {
    corpus-path = "eval/corpus/seed.jsonl"
  }
}
