apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: kantheon

resources:
  - ../../base

patches:
  - target:
      kind: Deployment
      name: themis-mcp
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/imagePullPolicy
        value: Never
      # Local cluster has no Alloy/Tempo endpoint — disable OTel export so the
      # pod doesn't spam connection errors on startup. Re-enable once the
      # observability stack is provisioned locally.
      - op: replace
        path: /spec/template/spec/containers/0/env
        value:
          - name: RESOLVER_OTEL_PROTOCOL
            value: grpc
          - name: OTEL_SERVICE_NAME
            value: themis-mcp
          - name: TELEMETRY_ENABLED
            value: "false"
          - name: CAPABILITIES_MCP_HOST
            value: capabilities-mcp.kantheon.svc.cluster.local
          - name: CAPABILITIES_MCP_PORT
            value: "7501"
          - name: CAPABILITIES_MCP_URL
            value: http://capabilities-mcp.kantheon.svc.cluster.local:7501
          # *_HOST + *_PORT pairs feed HOCON ${?VAR} substitutions in
          # application.conf. fork Stage 2.6 switch-over: these now target the
          # in-repo kantheon services — Themis calls the engine REST APIs
          # directly (Nlp /v1/analyze, Fuzzy /match), not the MCP wrappers.
          # NLP_*/FUZZY_* var names kept for the stable HOCON contract.
          - name: NLP_MCP_HOST
            value: nlp.kantheon.svc.cluster.local
          - name: NLP_MCP_PORT
            value: "7270"
          - name: NLP_MCP_URL
            value: http://nlp.kantheon.svc.cluster.local:7270
          - name: FUZZY_MCP_HOST
            value: fuzzy.kantheon.svc.cluster.local
          - name: FUZZY_MCP_PORT
            value: "7265"
          - name: FUZZY_MCP_URL
            value: http://fuzzy.kantheon.svc.cluster.local:7265
          - name: LLM_GATEWAY_HOST
            value: llm-gateway.kantheon.svc.cluster.local
          - name: LLM_GATEWAY_PORT
            value: "7280"
          - name: LLM_GATEWAY_URL
            value: http://llm-gateway.kantheon.svc.cluster.local:7280
