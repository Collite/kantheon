apiVersion: v1
kind: Service
metadata:
  name: {{ include "themis-mcp.fullname" . }}
  labels:
    {{- include "themis-mcp.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "themis-mcp.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.ports.http }}
      targetPort: {{ .Values.ports.http }}
